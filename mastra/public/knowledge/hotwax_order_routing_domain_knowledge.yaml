# =============================================================================
# DOMAIN KNOWLEDGE — HOTWAX COMMERCE ORDER ROUTING ENGINE
# =============================================================================
# Purpose   : Ontology + Rules + Constraints for an Order Routing Configurator
#             AI Agent
# Source    : docs.hotwax.co/documents/retail-operations/orders/order-routing
#             (fetched via github.com/hotwax/oms-documentation, branch:
#             user-guides-pub, May 2026)
# Layers    : 1-Ontology  2-Rules & Constraints  3-Goals & Preferences
# =============================================================================


# ─────────────────────────────────────────────────────────────────────────────
# LAYER 1 · ONTOLOGY
# What exists, what it means, and how concepts relate
# ─────────────────────────────────────────────────────────────────────────────

ontology:

  domain: "HotWax Commerce — Order Routing Engine"

  purpose: >
    The Order Routing Engine (also called the Brokering Engine) automatically
    assigns orders from the brokering queue to fulfillment facilities. It
    operates on a three-level hierarchy: Brokering Run → Routing Rule →
    Inventory Rule. Each level answers a distinct question:
      - "Brokering Run: When does routing happen?"
      - "Routing Rule: Which orders are in this batch?"
      - "Inventory Rule: Which facility fulfills each order?"

  # ── ENTITIES ────────────────────────────────────────────────────────────────

  entities:

    BrokeringRun:
      definition: >
        The highest-level organizational unit in order routing. Controls the
        schedule and frequency at which the brokering engine executes.
        Each run can have a unique frequency. Multiple runs can coexist for
        different order priorities. Runs can be in Draft (inactive) or Active
        (executing on schedule) state.
      ui_label: "Brokering Run"
      attributes:
        name:
          type: string
          required: true
          description: "Human-readable identifier, e.g. 'High Priority Orders'"
        description:
          type: string
          required: false
          description: "Clarifies intent for team members"
        status:
          type: enum
          values: [Draft, Active]
          default: Draft
          constraint: "Must be set to Active before the run processes any orders"
        schedule:
          type: cron_expression_or_preset
          description: >
            Frequency of execution. Can be a preset (Every 5 Minutes, Hourly,
            Daily) or a custom cron expression.
          examples:
            - label: "Every 5 minutes"
              cron: "*/5 * * * *"
            - label: "Every hour"
              cron: "0 * * * *"
            - label: "Every hour between 8 AM and 2 PM"
              cron: "0 8-14 * * *"
            - label: "Every day at 7 AM"
              cron: "0 7 * * *"
            - label: "Every 15 minutes between 6 AM and 6 PM"
              cron: "*/15 6-18 * * *"
        product_store_id:
          type: string
          description: "Which product store this run belongs to (multi-store support)"
      relationships:
        contains: "RoutingRule (1..N, ordered by sequence)"
      lifecycle:
        - "Created in Draft"
        - "Routing rules configured"
        - "Inventory rules configured"
        - "All rules set to Active"
        - "Run set to Active — begins executing on schedule"

    RoutingRule:
      definition: >
        Also called an "Order Batch" in the UI. The mid-level unit that defines
        WHICH orders are included in a batch for routing. Uses order filters
        to group orders and order sorting to sequence them within the batch.
        Multiple routing rules within one run are evaluated in sequence —
        first match wins. If an order matches a routing rule's filters AND an
        inventory rule within it successfully allocates a facility, the order
        exits the brokering queue. The routing rule does NOT select facilities —
        that is the job of its child Inventory Rules.
      ui_label: '"Order Batch" in UI, "Routing Rule" in documentation'
      attributes:
        name:
          type: string
          required: true
          description: "e.g. 'Same-day/Next-day orders', 'Standard orders'"
        status:
          type: enum
          values: [Draft, Active, Archived]
          default: Draft
        sequence:
          type: integer
          description: >
            Determines evaluation order within the parent run. Lower number =
            evaluated first. Configurable via drag-and-drop in UI.
        order_filters:
          type: list[OrderFilter]
          description: "Zero or more filters. No filters = all orders from all queues."
        order_sorting:
          type: list[OrderSortOption]
          description: "Zero or more sort criteria. No sorting = order by order date (FIFO)."
      relationships:
        parent: "BrokeringRun (1)"
        contains: "InventoryRule (1..N, ordered by sequence)"
      constraint: >
        An order is processed by the FIRST routing rule whose filters it matches.
        Remaining rules are not evaluated for that order in that batch run.

    InventoryRule:
      definition: >
        The innermost level. Defines HOW to find the best fulfillment facility
        for orders in a batch. A three-step process: Filter (which facilities
        are eligible?) → Sort (which eligible facility is best?) → Action
        (what happens if allocation fails?). Multiple inventory rules within
        one routing rule are tried in sequence. If rule N cannot allocate
        inventory to an order, rule N+1 is tried.
      ui_label: "Inventory Rule"
      attributes:
        name:
          type: string
          required: true
          description: "e.g. 'Check all warehouses in 100 miles'"
        status:
          type: enum
          values: [Draft, Active, Archived]
          default: Draft
        sequence:
          type: integer
          description: "Evaluation order within parent routing rule. Configurable via drag-and-drop."
        inventory_filters:
          type: list[InventoryFilter]
          description: "Zero or more filters. No filters = all online-fulfillment-enabled facilities."
        facility_sorting:
          type: list[FacilitySortOption]
          description: "Zero or more sort criteria. No sorting = sort by facility creation date."
        actions:
          type: AfterActionConfig
          description: "Defines behaviour for partially-available and fully-unavailable items."
      relationships:
        parent: "RoutingRule (1)"
      default_behaviour:
        no_filter: "All facilities enabled for online fulfillment are considered"
        no_sort: "Facilities sorted by creation date"
        partial_allocation: "Disabled by default"
        unavailable_action: "Move to next rule (default)"

    Facility:
      definition: >
        A physical or logical location that stores inventory and/or fulfills
        orders. Both retail stores and warehouses are Facility entities.
        Virtual facilities (no physical location) are used for parking queues.
      attributes:
        facilityId: { type: string, example: "STORE_101, WAREHOUSE_EAST" }
        facilityTypeId:
          type: enum
          values: [RETAIL_STORE, WAREHOUSE, VIRTUAL_FACILITY]
        maximumOrderLimit:
          type: integer
          description: >
            Maximum number of orders the brokering engine may assign per day.
            Options: Unlimited, No Capacity (blocks all SFS), Custom integer.
            Configurable in Facility App, Fulfillment App, or ATP App.
        lat_long:
          type: geo_coordinates
          description: "Automatically stored when a facility address is added. Used for proximity calculations."
      relationships:
        member_of: "FacilityGroup (0..N)"
        typed_by: "FacilityType (1)"

    FacilityGroup:
      definition: >
        A named, logical set of Facilities. Inventory rules reference facility
        groups rather than individual facilities. A facility can belong to
        multiple groups. Groups must be created with the Brokering_Group subtype
        to be usable in inventory rules.
      attributes:
        facilityGroupId: { type: string, example: "WAREHOUSES, EAST_COAST_STORES" }
        facilityGroupTypeId:
          type: enum
          values: [Brokering_Group, Pickup_Group]
          constraint: "Must be Brokering_Group subtype to appear in inventory rule filters"
      relationships:
        contains: "Facility (1..N, many-to-many)"

    Order:
      definition: >
        A customer purchase request synced from Shopify (or another channel).
        Carries a full lifecycle from creation through brokering, fulfillment,
        and completion.
      attributes:
        orderId: { type: string }
        statusId:
          type: enum
          values: [ORDER_CREATED, ORDER_APPROVED, ORDER_COMPLETED]
        orderPriority:
          type: enum
          values: [high, medium, low]
          default: medium
        shipmentMethodTypeId:
          type: string
          examples: [SAME_DAY, NEXT_DAY, TWO_DAY, STANDARD]
          note: >
            HotWax maps delivery days: Same-Day=0, Next-Day=1, Two-Day=2.
            Used for order sorting by shipping method.
        salesChannel: { type: string, examples: [eCommerce, Marketplace, Facebook_Marketplace] }
        promiseDate: { type: date, description: "Relevant for pre-orders and backorders" }
        originFacilityId:
          type: string
          description: "Facility where order originated. Relevant for Send Sale orders."
        customerShippingAddress:
          type: geo_coordinates
          description: "Automatically stored. Used for proximity calculations in inventory rules."
      queue_states:
        Brokering_Queue:
          description: "Orders approved and waiting for inventory allocation. Default queue."
        Preorder_Backorder_Parking:
          description: "Orders for future-release or out-of-stock products. Released when trigger met."
        Rejected_Parking:
          description: "Orders rejected by a facility. Awaiting re-routing."
          ui_label_alternates: ["Rejected Item Parking", "Rejected_Parking"]
        Unfillable_Parking:
          description: "Orders that exhausted all routing rules. Require manual action or re-routing."
        Preorder_Backorder_Parking_alias:
          description: "Sometimes shown in UI as 'Pre-Orders Parking'."

    # Inventory concepts (from Layer 1 Ontology)
    InventoryConcepts:
      QOH:
        definition: "Quantity On Hand — raw physical count at a facility per product variant."
      ATP:
        definition: "Available To Promise = QOH minus open order reservations."
        formula: "ATP = QOH - reservations"
      OnlineATP:
        definition: "What is published to Shopify. Floor is 0 (never negative)."
        formula: "Online ATP = MAX(ATP - safety_stock - threshold, 0)"
      BrokeringSafetyStock:
        definition: >
          DISTINCT from online ATP safety stock. The minimum number of units
          a facility must have in stock for it to be eligible to receive a
          brokering allocation. Does not affect what Shopify sees — only
          affects facility eligibility during inventory rule evaluation.
        example: >
          If brokering_safety_stock = 10, only facilities with ≥ 10 units
          of the item are eligible. Protects walk-in customer inventory.
      OnlineATPSafetyStock:
        definition: >
          Per-facility, per-product buffer subtracted from ATP before
          publishing Online ATP to Shopify. Separate from BrokeringSafetyStock.


  # ── FILTERS ─────────────────────────────────────────────────────────────────

  filters:

    order_filters:
      description: "Applied at the RoutingRule level to define which orders enter a batch."

      Queue:
        type: multi_select
        description: "Selects which parking queue(s) to pull orders from."
        values:
          Brokering_Queue:
            description: "Standard approved orders awaiting allocation. Most common choice."
            semantic_tags: [approved_order, awaiting_allocation, normal_routing_input]
            lifecycle_role: routing_input
          Preorder_Backorder_Parking:
            description: "Orders for future-release or OOS products."
            semantic_tags: [preorder, backorder, future_release, out_of_stock, exception_parking]
            lifecycle_role: exception_parking
          Rejected_Parking:
            description: "Orders rejected by a facility, needing re-routing."
            semantic_tags: [rejected_order, rerouting_candidate, exception_parking]
            lifecycle_role: exception_parking
          Unfillable_Parking:
            description: "Orders that failed all routing rules."
            semantic_tags: [unfillable_order, failed_allocation, exhausted_routing_rules, exception_parking]
            lifecycle_role: exception_parking
        default_behaviour: "No filter = orders from ALL queues are included."
        agent_guidance: >
          Do not add a Queue filter from default behavior. No queue filter
          means all queues are included. Set Queue only when the merchant
          explicitly asks to filter the order source queue or parking, such as
          Brokering_Queue, rejected parking, unfillable parking, preorder, or
          backorder. Requests about fulfillment from warehouses, stores,
          facilities, or locations are inventory-rule requests, not queue
          filter requests.
        option_interpretation_rules:
          sibling_options_are_not_related_by_default:
            description: >
              Options listed under the same filter are valid choices for that
              filter, but they are not automatically related business concepts.
            guidance: >
              Do not suggest adjacent options merely because they share the same
              filter. Group options only when they share semantic_tags,
              lifecycle_role, or a user-stated business meaning.

          concept_to_option_matching:
            description: >
              When the user names a business concept, match options by semantic
              meaning rather than by proximity in the option list.
            guidance: >
              First identify the business concept in the user's request. Then
              select only options whose description, semantic_tags,
              lifecycle_role, aliases, or explicit business meaning match that
              concept. If multiple options match the same concept, ask a
              clarification question. If only one option matches, do not ask
              about unrelated sibling options.

          clarification_scope:
            description: >
              Clarifying questions should stay inside the unresolved business
              concept.
            guidance: >
              Ask about other options only when they are plausible matches for
              the same concept. Do not broaden a clarification to every queue,
              channel, shipment method, enum, or option in the same filter.

      ShipmentMethodType:
        type: multi_select
        description: "Filters by SLA promised to customer at checkout."
        values: [Same_Day, Next_Day, Two_Day, Standard]
        use_case: "Creates urgency-separated batches. Same-day/Next-day in one rule, Standard in another."
        note: "Supports Exclude tab — e.g. all methods except Standard."

      SalesChannel:
        type: multi_select
        description: "Filters by order capture channel."
        values: [eCommerce, Marketplace, and any custom-mapped channel]
        use_case: >
          Route marketplace orders to warehouses only (contractual obligation).
          Separate eCommerce from marketplace routing strategies.
        prerequisite: "Marketplace_sales_channel must be created and mapped in HotWax Commerce."
        supports_exclude: true

      OrderPriority:
        type: multi_select
        description: "Filters by HotWax-assigned priority level."
        values: [high, medium, low]
        default: medium
        note: "Priority is set in HotWax Commerce, not automatically synced from Shopify."

      PromiseDate:
        type: date_filter
        description: "Filters pre-orders/backorders by their promise date."
        use_case: "Route overdue promise-date orders first for SLA compliance."
        applicable_queues: [Preorder_Backorder_Parking]

      OriginFacilityGroup:
        type: facility_group_select
        description: "Filters by the facility group where the order originated."
        use_case: >
          Route 'Send Sale' orders (placed by store associates on behalf of
          walk-in customers) differently from standard online orders.

      ExcludeTab:
        type: modifier
        description: "Applied to any filter. Inverts selection — excludes specified values, includes all others."
        example: "Exclude Facebook_Marketplace → includes all other sales channels."

    inventory_filters:
      description: "Applied at the InventoryRule level to determine facility eligibility."

      FacilityGroup:
        type: facility_group_select
        description: "Restricts brokering to facilities that are members of a named FacilityGroup."
        constraint: "Group must have Brokering_Group subtype."
        default_behaviour: "No filter = all online-fulfillment-enabled facilities considered."
        use_case: "Rule 1: Warehouses only. Rule 2: Stores + Warehouses. Rule 3: no filter (all)."
        agent_guidance: >
          This is the primary mechanism for tiered facility lookup. Always
          ask the merchant what FacilityGroups they have configured before
          recommending inventory rule filters.

      Proximity:
        type: distance_miles
        description: >
          Restricts to facilities within N miles of the customer's delivery
          address. Both facility and customer lat/long are stored automatically
          by HotWax when addresses are saved.
        use_case: "100-mile radius for same-day SLA; 250 miles for next-day."
        behaviour_on_miss: >
          If no facility within the radius has sufficient ATP, this inventory
          rule returns zero candidates → the order falls through to the next
          inventory rule.

      BrokeringSafetyStock:
        type: integer_threshold
        description: >
          Only considers facilities with ≥ N units in stock. Protects
          walk-in inventory. DISTINCT from online ATP safety stock.
        example: "BrokeringSafetyStock > 10 → only facilities with 11+ units eligible."

      ExcludeFacilityGroup:
        type: facility_group_select
        description: "Exclude a specific group rather than selecting all valid groups individually."
        use_case: "Include all facilities except outlet stores."

      AllItemsAvailableAnywhere:
        type: boolean
        description: >
          Only allocate a shipgroup if ALL items in it are available — not
          necessarily at the same location, just available simultaneously.
          Prevents partial shipgroup allocation.
        default: false

      TurnOffFacilityOrderLimitCheck:
        type: boolean
        description: >
          Bypasses the maximumOrderLimit constraint for this inventory rule.
          Useful during peak seasons or flash sales when capacity should
          temporarily be ignored.
        default: false
        warning: "Can overload store associates if not managed with other controls."

      ShipmentThresholdValueCheck:
        type: boolean
        description: >
          Only allocate if the item value exceeds the globally-configured
          Brokering Shipment Threshold. Works with partial allocation.
          Threshold is set at Product Store level, not per inventory rule.
        default: false


  # ── SORT OPTIONS ─────────────────────────────────────────────────────────────

  sort_options:

    order_sorting:
      description: "Applied at RoutingRule level. Sequences orders within a batch before facility lookup."
      default_behaviour: "Orders sorted by order date (FIFO) if no sorting specified."

      OrderDate:
        direction: ASC
        effect: "FIFO — oldest orders processed first."
        recommended_for: "Most routing rules as default."

      OrderPriority:
        direction: "High → Medium → Low"
        effect: "Most urgent orders receive inventory allocation first."

      ShippingMethod:
        direction: "By delivery_days ASC (0=Same-Day first)"
        effect: "Tightest SLA gets inventory first within a mixed batch."
        note: >
          Unnecessary when all orders in a batch use the same shipping method.
          e.g. A Standard-only batch does not need shipping method sorting.

      ShipBy: { type: date_asc, description: "Sort by promised ship-by date." }
      ShipAfter: { type: date_asc, description: "Sort by ship-after date." }

    facility_sorting:
      description: "Applied at InventoryRule level. Ranks eligible facilities to pick the best one."
      default_behaviour: "Facilities sorted by creation date if no sorting specified."

      Proximity:
        direction: ASC
        effect: "Closest facility to customer address first. Minimises transit time and cost."
        recommended_for: "Same-day, next-day, and any proximity-sensitive orders."
        prerequisite: "Lat/long stored on both facility and customer address."

      InventoryBalance:
        direction: DESC
        effect: "Facility with highest ATP first. Prevents stockouts, promotes stock rotation."
        recommended_for: "Standard orders where proximity is less critical."

      FacilityOrderLimit:
        direction: "Most remaining capacity first"
        effect: "Distributes fulfillment workload evenly across facilities."

      BrokenStyle:
        direction: "Fragmented inventory first"
        effect: >
          Prioritises facilities that hold only a few sizes or variants left of
          a style. Clears fragmented inventory before it ages into markdown.
          A "broken size" or "broken style" is retail jargon for a SKU with
          incomplete size/colour run — the kind of stock that won't sell to a
          walk-in shopper looking for a specific size but is perfectly
          deliverable for an online order.
        recommended_for: >
          Standard / regular routing where margin protection matters more than
          delivery speed. Pair with Proximity as a tie-breaker.
        merchant_signals:
          - "we want to clear aging stock"
          - "move broken sizes before markdown"
          - "ship from stores with one or two sizes left"
          - "protect full-price sellthrough at our big stores"

      CustomSequence:
        type: manual_ordered_list
        effect: >
          Full manual override. Retailer defines exact facility priority order.
          Useful for underperforming stores, regional routing, seasonal inventory.
        maintenance: "Requires manual updates as facility mix changes."


  # ── AFTER-ACTIONS ─────────────────────────────────────────────────────────────

  after_actions:
    description: >
      Defined at the InventoryRule level. Specify behaviour when allocation
      fails — either partially (some items available) or fully (no items).

    partially_available:

      AllowPartialAllocation:
        type: boolean
        default: false
        description: >
          Allows an order to be split across multiple facilities if full
          allocation at one location is not possible.
        trade_off: "Enables faster partial fulfillment but increases shipping costs."
        interaction: >
          Works with Brokering Shipment Threshold — splitting only occurs if
          item value exceeds the threshold.
        recommended_placement: "Final inventory rule only."

      PartiallyAllocateGroupedItems:
        type: boolean
        default: false
        description: >
          Controls whether grouped items (kits, gift sets) can be split across
          facilities. Can be toggled independently from AllowPartialAllocation.
        use_case: >
          Enable partial allocation for regular items (toggle ON), but keep
          grouped items together (toggle OFF). Ensures kits ship complete.

    unavailable_items:

      NextRule:
        type: action
        is_default: true
        description: >
          Move unallocated items to the next inventory rule in sequence.
          Default action when multiple inventory rules exist.
        recommended_for: "All inventory rules except the final one."

      MoveItemsToQueue:
        type: action_with_parameter
        parameter: queue_name
        values: [Unfillable_Parking, Backorder_Parking, Custom_Queue]
        description: >
          Transfer unallocated items to a named parking queue. No further
          allocation attempts will be made.
        recommended_for: "Final inventory rule."

      AutoCancelDays:
        type: integer
        description: >
          Automatically cancel unallocated orders after N days. Prevents
          orders lingering indefinitely in the fulfillment pipeline.
        recommended_for: "Final inventory rule alongside MoveItemsToQueue."
        note: >
          Applies to ALL unfillable orders in the batch. For per-order
          exceptions, manage directly in HotWax OMS.

      ClearAutoCancelDays:
        type: action
        description: >
          Removes an existing auto-cancel date from unallocated orders.
          Used when incoming inventory is expected — prevents cancellation
          so the order can be re-brokered when stock arrives.


# ─────────────────────────────────────────────────────────────────────────────
# LAYER 2 · RULES & CONSTRAINTS
# What is allowed, what is enforced, and what are the consequences
# ─────────────────────────────────────────────────────────────────────────────

rules_and_constraints:

  # ── HARD CONSTRAINTS (non-negotiable, always enforced) ──────────────────────

  hard_constraints:

    ApprovalGate:
      statement: >
        An order cannot enter the brokering queue until it reaches
        ORDER_APPROVED status.
      enforced_by: "Order lifecycle state machine"
      violation_consequence: >
        Routing a payment-pending order would reserve inventory that may
        never be needed, corrupting ATP figures.

    ATPFloor:
      statement: >
        Online ATP published to Shopify can never be negative.
        If formula produces a value < 0, HotWax publishes 0.
      formula: "published_online_atp = MAX(QOH - reservations - safety_stock - threshold, 0)"
      violation_consequence: >
        Negative ATP would allow Shopify to accept purchases for phantom
        inventory — guaranteed oversell.

    SafetyStockPriority:
      statement: >
        Brokering safety stock is subtracted before a facility is considered
        eligible. A facility with allocatable ATP < order quantity is excluded
        regardless of QOH.
      formula: "allocatable_atp = QOH - reservations - brokering_safety_stock"
      violation_consequence: "Walk-in customer finds empty shelf."

    FirstMatchSequence:
      statement: >
        Routing rules and inventory rules are evaluated in strict priority
        sequence. The FIRST rule that matches and successfully allocates wins.
        Remaining rules are not evaluated for that order in that run.
      implication: "Rule ordering is semantically critical — not cosmetic."
      violation_consequence: >
        Misplaced catch-all rule captures all orders, specific rules never fire.

    BOPISFacilityLock:
      statement: >
        For BOPIS orders, the fulfillment facility is the customer-selected
        store. The brokering engine must NOT substitute an alternative facility.
        If the customer's store cannot fulfill, the order is flagged for
        manual review — not silently rerouted.
      violation_consequence: >
        Customer drives to their chosen store and finds nothing waiting.
        Severe trust and experience failure.

    MaximumOrderLimitGuard:
      statement: >
        A facility that has reached its maximumOrderLimit is excluded from
        brokering, regardless of ATP availability.
      override: >
        The TurnOffFacilityOrderLimitCheck inventory filter can bypass this
        for a specific inventory rule (e.g. during peak season).
      violation_consequence: "Store overwhelmed — delayed fulfillment, associate overload."

    BORISQOHUpdateOnAcceptance:
      statement: >
        A BORIS return updates facility QOH only when the store associate
        ACCEPTS the return — not when the customer initiates it.
      violation_consequence: >
        Routing orders against inventory that hasn't physically arrived yet.

    BatchScopeAtomicity:
      statement: >
        The brokering engine processes all orders in the queue at the moment
        a batch starts. Orders that arrive after the batch starts wait for
        the next scheduled run.
      agent_implication: >
        An order just approved will not be brokered until the next batch.
        Do not tell a user their order will be brokered immediately.

    RunMustBeActiveToProcess:
      statement: >
        A BrokeringRun, RoutingRule, and InventoryRule must each be individually
        set to Active status before they participate in brokering. Draft status
        means configured but not executing.
      activation_order: "Configure all rules → activate inventory rules → activate routing rules → activate run."

  # ── SOFT CONSTRAINTS (configurable preferences, can be overridden) ──────────

  soft_constraints:

    InventorySyncLag:
      type: epistemic_constraint
      statement: >
        HotWax does not maintain real-time inventory sync with Shopify.
        ATP and QOH values are pushed on a scheduled basis (typically every
        15 minutes). All inventory readings are stale by up to N minutes
        where N is the sync interval.
      agent_behaviour: >
        When reporting inventory figures, always caveat with sync timing.
        Example: "As of the last sync (approx. 8 minutes ago), ATP was 12."
        Never present inventory as exact real-time truth.

    ProximityVsInventoryBalance:
      type: trade_off
      statement: >
        Proximity sorting minimises delivery time and cost but may deplete
        nearby facilities faster. Inventory balance sorting distributes stock
        more evenly but may increase average shipping distance.
      resolution: >
        Use Proximity for urgent SLA orders. Use Inventory Balance for
        standard orders where delivery speed is less critical.

    PartialAllocationTradeOff:
      type: trade_off
      statement: >
        Allowing partial allocation fulfills items faster but increases
        per-order shipping cost (multiple shipments). Disabling it keeps
        orders together but risks more unfillable outcomes.
      mitigation: >
        Use Brokering Shipment Threshold to only allow splitting for
        orders whose item value exceeds a minimum. Configured at Product
        Store level.

    SingleVsMultipleRuns:
      type: design_decision
      statement: >
        A single brokering run with multiple routing rules is sufficient when
        all order types need the same frequency. Use multiple runs only when
        different order types require different execution frequencies.
      agent_guidance: >
        Ask: "Do your high-priority and standard orders need to be brokered
        at different frequencies?" If yes → multiple runs. If no → single run
        with multiple routing rules.

    FacilityGroupDesignDependency:
      type: prerequisite_constraint
      statement: >
        Inventory rule facility filters depend on FacilityGroups being
        pre-configured in the Facility App with Brokering_Group subtype.
        The AI agent cannot configure routing rules that reference
        FacilityGroups that don't exist.
      agent_guidance: >
        Before recommending inventory rule configurations, confirm which
        FacilityGroups the merchant has already created. Do not assume
        standard groups (Warehouses, Stores) exist.

  # ── INVENTORY RULE SEQUENCING PATTERNS ─────────────────────────────────────

  sequencing_patterns:

    description: >
      The documented best-practice pattern for structuring multiple inventory
      rules within a routing rule is a progressive expansion of the facility
      search space, with partial allocation enabled only in the final rule.

    canonical_pattern:
      - sequence: 1
        label: "Tightest constraint"
        example: "Warehouses within 100 miles"
        partial_allocation: false
        unavailable_action: next_rule

      - sequence: 2
        label: "Expanded facility type"
        example: "All facilities within 100 miles"
        partial_allocation: false
        unavailable_action: next_rule

      - sequence: 3
        label: "Expanded distance"
        example: "All facilities within 250 miles"
        partial_allocation: false
        unavailable_action: next_rule

      - sequence: 4
        label: "No distance constraint"
        example: "All facilities, no proximity filter"
        partial_allocation: false
        unavailable_action: next_rule

      - sequence: 5
        label: "Final rule — enable splitting"
        example: "All facilities, allow partial allocation"
        partial_allocation: true
        unavailable_action: "Move to Unfillable Queue + set auto_cancel_days"

    standard_orders_pattern:
      description: >
        For standard orders, warehouses are preferred over stores to preserve
        in-store stock for higher-priority and walk-in customer needs.
        Inventory balance is prioritised over proximity.
      rules:
        - sequence: 1
          facility_filter: "Warehouse group + Proximity 250 miles"
          sort: inventory_balance
          action: next_rule
        - sequence: 2
          facility_filter: "Warehouse group + Proximity 500 miles"
          sort: inventory_balance
          action: next_rule
        - sequence: 3
          facility_filter: "Warehouse group, no proximity"
          sort: inventory_balance
          action: "Move to Unfillable Queue + auto_cancel_days: 7"


# ─────────────────────────────────────────────────────────────────────────────
# LAYER 3 · GOALS & PREFERENCES
# What retailers are trying to optimise — the "why" behind configurations
# ─────────────────────────────────────────────────────────────────────────────

goals_and_preferences:

  primary_goals:

    MeetDeliverySLA:
      description: "Fulfil orders from the location most likely to deliver within the promised window."
      signals:
        - merchant_mentions: ["same-day", "next-day", "SLA", "delivery promise", "expedited"]
      configuration_implications:
        - Use separate routing rules per shipment method type
        - Use Proximity filter and sort for tight SLAs
        - Use higher-frequency brokering runs for urgent orders
        - Place urgent routing rules at lower sequence numbers (higher priority)

    MinimiseShippingCost:
      description: "Reduce carrier cost by fulfilling from nearby locations and avoiding unnecessary splits."
      signals:
        - merchant_mentions: ["shipping cost", "freight", "split shipments", "cost-effective"]
      configuration_implications:
        - Proximity sort on inventory rules
        - Disable partial allocation in early rules; enable only in final rule
        - Enable Brokering Shipment Threshold to guard against low-value splits
        - Prefer warehouse fulfillment (larger volumes = better carrier rates)

    BalanceInventoryAcrossNetwork:
      description: "Prevent stockouts at key locations by distributing fulfillment load evenly."
      signals:
        - merchant_mentions: ["inventory balance", "stock rotation", "prevent stockout", "overstock"]
      configuration_implications:
        - Inventory Balance sort on facility sorting
        - Custom sequence to route toward high-stock locations
        - Avoid always routing to the same (nearest) warehouse

    ProtectInStoreInventory:
      description: "Preserve walk-in customer inventory at retail stores by limiting online order allocation."
      signals:
        - merchant_mentions: ["walk-in customers", "store inventory", "BOPIS capacity", "in-store stock"]
      configuration_implications:
        - Set maximumOrderLimit on RETAIL_STORE facilities
        - Use Brokering Safety Stock filter on inventory rules for store locations
        - Prefer warehouses over stores in inventory rule sequence
        - Reserve stores as fallback (later in sequence), not primary

    MaximiseFulfillmentRate:
      description: "Fulfil as many orders as possible without cancellation."
      signals:
        - merchant_mentions: ["unfillable orders", "cancellation rate", "fulfillment rate", "backlog"]
      configuration_implications:
        - Use multiple inventory rules with progressive expansion
        - Enable partial allocation in final inventory rule
        - Configure MoveItemsToQueue → Unfillable Queue (not auto-cancel) so orders can be re-brokered
        - Clear auto-cancel dates when incoming inventory is expected

    ReduceOperationalOverhead:
      description: "Minimise manual intervention by automating edge-case handling."
      signals:
        - merchant_mentions: ["manual work", "operations team", "automation", "hands-off"]
      configuration_implications:
        - Set auto_cancel_days on final inventory rule
        - Configure rejected order re-routing run (Queue = Rejected_Parking)
        - Use ClearAutoCancelDays action when PO is received

    OptimiseFulfillmentCostByRentAgreement:
      description: "Route orders to stores with fixed rent first to avoid mall commission fees."
      signals:
        - merchant_mentions: ["mall rent", "commission", "rent agreement", "revenue sharing"]
      configuration_implications:
        - Create FacilityGroup for fixed-rent stores
        - "Rule 1: Fixed-rent stores | Rule 2: All stores as fallback"
        - "Sort: Inventory Balance (both rules)"

    ManageSeasonalDemandSpikes:
      description: "Handle holiday or peak season surges without degrading SLA."
      signals:
        - merchant_mentions: ["holiday", "peak season", "Black Friday", "surge", "high volume"]
      configuration_implications:
        - Create dedicated seasonal BrokeringRun kept in Draft off-peak
        - "Activate during peak: high-frequency schedule (every 5 min)"
        - Optionally turn off daily routing run to avoid double-processing
        - Optionally enable order limits on stores as SFS fallback


  # ── CONTEXTUAL STATE ─────────────────────────────────────────────────────────

  context_and_state:

    description: >
      The AI agent must be aware of the following runtime context before making
      recommendations. This is the "current state" layer — what is actually
      configured and active right now in the merchant's HotWax instance.

    required_context:
      product_store:
        description: "Which product store is being configured. Routing is per-store."
        why: "Multi-store retailers have separate routing configurations per store."

      existing_facility_groups:
        description: "Which FacilityGroups exist with Brokering_Group subtype."
        why: "Inventory rule filters can only reference groups that already exist."
        agent_must_ask: >
          "Which facility groups do you currently have set up for brokering?
          For example, do you have a 'Warehouses' group, a 'Stores' group,
          or any regional groups?"

      existing_brokering_runs:
        description: "Are any runs currently Active? What is their schedule?"
        why: >
          Recommending a new run may create duplicate processing.
          New routing rules may be addable to an existing run.

      facility_order_limits:
        description: "Which facilities have maximumOrderLimit configured and at what value?"
        why: "Affects whether TurnOffFacilityOrderLimitCheck is needed."

      brokering_shipment_threshold:
        description: "Has a Brokering Shipment Threshold been set at the Product Store level?"
        why: "Affects partial allocation behaviour across all inventory rules."

      inventory_sync_interval:
        description: "How frequently does HotWax sync inventory to Shopify?"
        why: "Determines staleness window for all inventory readings."
        default_assumption: "~15 minutes unless merchant confirms otherwise."

    epistemic_freshness:
      description: >
        The agent must track when it last read each piece of configuration data
        and communicate confidence accordingly.
      rules:
        - "Inventory values (QOH, ATP): stale after sync_interval minutes."
        - "Configuration values (FacilityGroups, routing rules): stable unless merchant reports a change."
        - "Order queue state: changes with every brokering run execution."
      agent_communication_pattern: >
        "Based on your current configuration [confidence: high — just confirmed],
        the next brokering run will process approximately N orders from the
        Brokering Queue. ATP at Warehouse East was 47 as of the last sync
        (~12 minutes ago)."


# ─────────────────────────────────────────────────────────────────────────────
# DOCUMENTED USE CASES
# Source: use-cases.md — 9 scenarios with exact configurations
# ─────────────────────────────────────────────────────────────────────────────

use_cases:

  "1_marketplace_orders_warehouse_only":
    title: "Fulfilling marketplace orders from warehouse only"
    business_goal: "Route all marketplace orders exclusively to warehouses (contractual/logistical obligation)"
    prerequisites:
      - "Marketplace_sales_channel created and mapped in HotWax"
      - "FacilityGroup with Brokering_Group subtype containing all warehouses"
    routing_rule:
      order_filter: { SalesChannel: Marketplace }
      order_sort: OrderDate
    inventory_rule:
      inventory_filter: { FacilityGroup: Warehouses }
      facility_sort: Proximity
      actions:
        partial_allocation: true
        unavailable: "Move to Unfillable Queue"

  "2_ecommerce_warehouse_then_stores":
    title: "eCommerce orders: warehouse first, stores as fallback"
    business_goal: "Prioritise warehouse fulfillment; use stores only when warehouses cannot fulfil"
    prerequisites:
      - "FacilityGroup: Warehouses (Brokering_Group)"
      - "FacilityGroup: Stores (Brokering_Group)"
    routing_rule:
      order_filter: { SalesChannel: eCommerce }
      order_sort: OrderDate
    inventory_rules:
      - sequence: 1
        name: "Warehouses first"
        inventory_filter: { FacilityGroup: Warehouses }
        facility_sort: Proximity
        actions: { partial_allocation: optional, unavailable: next_rule }
      - sequence: 2
        name: "Stores fallback"
        inventory_filter: { FacilityGroup: Stores }
        facility_sort: Proximity
        actions: { partial_allocation: true, unavailable: "Unfillable Queue" }

  "3_reroute_rejected_orders":
    title: "Re-routing rejected orders"
    business_goal: "Automatically re-route orders rejected by a facility to the next best available location"
    routing_rule:
      order_filter: { Queue: Rejected_Parking }
      order_sort: OrderDate
    inventory_rule:
      inventory_filter: none
      facility_sort: Proximity
      actions:
        partial_allocation: optional
        unavailable: "Next Rule or Unfillable Queue"

  "4_proximity_based_routing":
    title: "Proximity-based order routing"
    business_goal: "Fulfil all orders from the location closest to the customer"
    routing_rule:
      order_filter: { Queue: Brokering_Queue }
      order_sort: OrderDate
    inventory_rule:
      inventory_filter: { Proximity: 50_miles }
      facility_sort: Proximity
      actions:
        partial_allocation: optional
        unavailable: "Next Rule (broaden radius) or Unfillable Queue"

  "5_minimum_stock_availability":
    title: "Minimum stock availability (brokering safety stock)"
    business_goal: "Only route to locations with sufficient stock to protect walk-in inventory"
    routing_rule:
      order_filter: { Queue: Brokering_Queue }
      order_sort: OrderDate
    inventory_rules:
      - sequence: 1
        inventory_filter: { BrokeringSafetyStock: ">10" }
        facility_sort: InventoryBalance
        actions: { unavailable: next_rule }
      - sequence: 2
        inventory_filter: none
        facility_sort: InventoryBalance
        actions: { partial_allocation: true, unavailable: "Unfillable Queue" }

  "6_store_fulfillment_by_rent_agreement":
    title: "Managing store fulfillment by rent agreements"
    business_goal: "Route to fixed-rent stores first to avoid mall commission fees"
    prerequisites:
      - "FacilityGroup: Fixed_Rent_Stores"
      - "FacilityGroup: All_Stores"
    routing_rule:
      order_filter: { Queue: Brokering_Queue }
      order_sort: OrderDate
    inventory_rules:
      - sequence: 1
        inventory_filter: { FacilityGroup: Fixed_Rent_Stores }
        facility_sort: InventoryBalance
        actions: { unavailable: next_rule }
      - sequence: 2
        inventory_filter: { FacilityGroup: All_Stores }
        facility_sort: InventoryBalance
        actions: { partial_allocation: true, unavailable: "Unfillable Queue" }

  "7_balance_shipping_cost_and_distance":
    title: "Balancing shipping cost and distance with split shipments"
    business_goal: >
      Minimise cost by preferring nearby single-location fulfillment;
      fall back to splits only when necessary
    routing_rule:
      order_filter: { Queue: Brokering_Queue }
      order_sort: OrderDate
    inventory_rules:
      - sequence: 1
        inventory_filter: { Proximity: 100_miles }
        facility_sort: Proximity
        actions: { partial_allocation: false, unavailable: next_rule }
      - sequence: 2
        inventory_filter: { Proximity: 100_miles }
        facility_sort: Proximity
        actions: { partial_allocation: true, unavailable: next_rule }
      - sequence: 3
        inventory_filter: none
        facility_sort: Proximity
        actions: { partial_allocation: false, unavailable: next_rule }
      - sequence: 4
        inventory_filter: none
        facility_sort: Proximity
        actions: { partial_allocation: true, unavailable: "Unfillable Queue" }
    note: >
      Pair with Brokering Shipment Threshold to prevent splitting low-value items.

  "8_grouped_items_kit_management":
    title: "Managing order splitting for grouped items (kits and gift items)"
    business_goal: "Split regular items freely but keep grouped items (kits, gift sets) together"
    routing_rule:
      order_filter: { Queue: Brokering_Queue }
      order_sort: OrderDate
    inventory_rules:
      - sequence: 1
        inventory_filter: none
        facility_sort: Proximity
        actions:
          partial_allocation: false
          partial_allocation_grouped_items: false
          unavailable: next_rule
      - sequence: 2
        inventory_filter: none
        facility_sort: Proximity
        actions:
          partial_allocation: true
          partial_allocation_grouped_items: false
          unavailable: next_rule
      - sequence: 3
        inventory_filter: none
        facility_sort: Proximity
        actions:
          partial_allocation: true
          partial_allocation_grouped_items: true
          unavailable: "Unfillable Queue"

  "9_holiday_season_routing":
    title: "Routing online orders during holiday season"
    business_goal: >
      Protect stores from fulfillment overload during high foot-traffic periods;
      route all online orders to warehouses first with selected stores as fallback
    prerequisites:
      - "Daily routing run turned off or paused before activating this run"
      - "FacilityGroup: Warehouse"
      - "FacilityGroup: Fallback_Locations (selected stores only)"
      - "Optional: order limits set on fallback stores"
    routing_rule:
      order_filter: { Queue: Brokering_Queue }
      order_sort: OrderDate
    inventory_rules:
      - sequence: 1
        inventory_filter: { FacilityGroup: Warehouse }
        facility_sort: Proximity
        actions: { partial_allocation: optional, unavailable: next_rule }
      - sequence: 2
        inventory_filter: { FacilityGroup: Fallback_Locations }
        facility_sort: Proximity
        actions: { partial_allocation: true, unavailable: "Unfillable Queue" }


# ─────────────────────────────────────────────────────────────────────────────
# ADDITIONAL SETTINGS
# Configuration outside the Order Routing App that affects brokering
# ─────────────────────────────────────────────────────────────────────────────

additional_settings:

  MaximumOrderCapacity:
    scope: "Per facility"
    configured_in: [Facility App, Fulfillment App, ATP App]
    options:
      UnlimitedCapacity: "No cap — facility accepts unlimited online orders"
      NoCapacity:
        description: "Blocks all SFS orders from this facility."
        use_cases:
          - "Peak walk-in hours — protect in-store experience"
          - "Staff shortages — store is understaffed for fulfillment"
          - "Emergencies — broken equipment, system outage, weather"
          - "Rush periods — store is overloaded and needs to drain its queue"
        agent_pattern: >
          When a merchant says "turn off store X for today" or "we lost a
          picker this morning, can we stop sending orders there", set
          MaximumOrderLimit to NoCapacity rather than removing the facility
          from its FacilityGroup — it's reversible without re-saving the
          routing rule.
      CustomCapacity: "Integer limit per day, e.g. 10 orders/day"
    interaction_with_routing: >
      When a facility reaches its daily cap, the brokering engine excludes it
      automatically. Can be bypassed per-inventory-rule via
      TurnOffFacilityOrderLimitCheck filter.

  BrokeringShipmentThreshold:
    scope: "Per product store (global)"
    configured_in: "HotWax OMS → Product Store → Store Settings → Brokering Shipment Threshold"
    behaviour: >
      Orders will only be split if ALL items in the split have a value
      exceeding the threshold. Prevents high shipping cost for low-value splits.
    examples:
      - items: ["Black Belt $80", "Brown Wallet $160"]
        threshold: 100
        result: "NOT split — Black Belt ($80) is below threshold"
      - items: ["Black Belt $80", "Black Wallet $80"]
        threshold: 100
        result: "NOT split — both below threshold"
      - items: ["Brown Belt $160", "Brown Wallet $160"]
        threshold: 100
        result: "SPLIT allowed — both above threshold"


# ─────────────────────────────────────────────────────────────────────────────
# TEST DRIVE
# Simulation capability for verifying routing configuration
# ─────────────────────────────────────────────────────────────────────────────

test_drive:

  purpose: "Verify routing logic against real orders without processing live transactions."

  what_can_be_tested:
    - BrokeringRun: "Tests full group of routing and inventory rules"
    - RoutingRule: "Tests one order batch and its inventory rules"
    - InventoryRule: "Tests individual facility selection logic; shows ATP and QOH at each facility"

  behaviour:
    pauses_scheduled_brokering: true
    shows_active_sessions: true
    reset_order:
      description: "Moves a brokered test order back to its original parking queue"
      rejection_reason_recorded: "Brokering test drive"
      variance_recorded: false

  agent_guidance: >
    When a merchant reports unexpected routing outcomes, recommend Test Drive
    as the first diagnostic step. It will highlight which filter is blocking
    an order and show the exact ATP/QOH at each facility that was evaluated.


# ─────────────────────────────────────────────────────────────────────────────
# REPORTS
# Monitoring brokering outcomes
# ─────────────────────────────────────────────────────────────────────────────

reports:

  BrokeredItemsReport:
    user: Operations team
    purpose: "Understand which items were brokered to which facilities"
    fields:
      HC_Order_ID: "Order ID in HotWax Commerce"
      SHOPIFY_ORDER_NAME: "Order ID in Shopify"
      UPCA: "Unique product identifier"
      FACILITY_ID: "Fulfillment facility"
      BROKERED_DATE: "Date order was brokered"
      PRODUCT_STORE_ID: "Product store"
    diagnostic_use: >
      Discrepancy between new eCommerce orders and entries here indicates
      orders not progressing to fulfillment — investigate routing rules or
      integration issues.

  BrokeredCountReport:
    user: Operations team
    purpose: "High-level count of brokered orders per store per date"
    fields:
      STORE: "Product store name"
      BROKERED_DATE: "Date"
      BROKERED_COUNT: "Number of orders brokered"
    diagnostic_use: >
      If brokered count significantly lags new order count, investigate
      unfillable reports and check routing rule configurations.


# ─────────────────────────────────────────────────────────────────────────────
# AGENT INTERACTION PATTERNS
# How the AI agent should reason and communicate in this domain
# ─────────────────────────────────────────────────────────────────────────────

agent_interaction_patterns:

  configuration_intent_mapping:
    description: >
      When a merchant describes a business need, the agent should map it to
      the corresponding configuration pattern before asking clarifying questions.
    examples:
      - merchant_says: "We want to fulfil same-day orders from the nearest store or warehouse"
        maps_to:
          routing_rule_filter: "Queue=Brokering_Queue, ShipmentMethodType=Same_Day"
          routing_rule_sort: ShippingMethod
          inventory_rule_filter: Proximity
          inventory_rule_sort: Proximity
          clarification_needed: "What proximity radius? Do you have separate warehouse/store groups?"

      - merchant_says: "Amazon orders must only go to our warehouse"
        maps_to:
          routing_rule_filter: "SalesChannel=Marketplace (or specific Amazon channel)"
          inventory_rule_filter: "FacilityGroup=Warehouses"
          prerequisite_check: "Is Marketplace_sales_channel mapped? Does Warehouses group exist?"

      - merchant_says: "We don't want to overwhelm our stores during the holidays"
        maps_to:
          goal: ManageSeasonalDemandSpikes + ProtectInStoreInventory
          configuration: use_case_9_holiday_season_routing
          prerequisite_check: "Should we pause the existing daily run or run them in parallel?"

  clarification_protocol:
    description: >
      Before recommending a configuration, the agent must confirm prerequisite
      entities exist. Ask one question at a time. Do not assume defaults exist.
    required_confirmations:
      - "Which FacilityGroups are configured with Brokering_Group subtype?"
      - "Is there an existing brokering run, or should we create a new one?"
      - "What shipment methods are used and what SLA is promised for each?"
      - "Are maximumOrderLimit values set on any facilities?"
      - "Is a Brokering Shipment Threshold set at the product store level?"

  confidence_and_epistemic_caveats:
    inventory_readings: >
      Always qualify: "As of the last sync (~N minutes ago), ATP was X."
      Never present as exact real-time truth.
    configuration_readings: >
      Configuration values are stable. High confidence unless merchant reports a change.
    routing_outcomes: >
      Predicted routing outcomes are based on current configuration and
      last-known inventory. Actual outcomes depend on live ATP at batch time.


# ─────────────────────────────────────────────────────────────────────────────
# DIAGNOSTIC PATTERNS
# Stable, machine-readable mappings from user-question patterns to required
# tool fetches and clarifying-question constraints. Consumed by the Brokering
# Runs list intent engine. Adding patterns here is data-only — no code change
# is required.
# ─────────────────────────────────────────────────────────────────────────────

diagnostic_patterns:

  - id: high_unfillable_rate
    user_question_examples:
      - "how do I reduce unfillable orders"
      - "why are so many orders going to unfillable parking"
      - "what should I change to fix the unfillable problem"
    intent: recommendation
    requires:
      - facility_change_summary
      - brokering_facility_groups
      - product_store_settings
      - facility_order_limits
    diagnostic_levers:
      - lever: facility_group_breadth
        explanation: "If the rules' FACILITY_GROUP filter is restricted to a narrow set, broadening it surfaces more inventory."
      - lever: store_threshold
        explanation: "A high product-store-level brokeringShipmentThreshold can block allocation when no single facility carries the full quantity."
      - lever: per_rule_safety_stock
        explanation: "A high BRK_SAFETY_STOCK on early rules can starve them of allocation; check inventoryFilters in the manifest."
      - lever: facility_caps
        explanation: "Facilities at maximumOrderLimit are skipped — verify which facilities have caps and whether they're being hit."
      - lever: unavailable_action
        explanation: "Rules that route to UNFILLABLE_PARKING on no-match increase the queue size; a nextRule action with a broader fallback rule can reduce it."
    appropriate_clarifying_questions:
      - "Should the recommendation prioritize SLA compliance or minimizing shipping cost?"
    inappropriate_clarifying_questions:
      - "Which facility groups are configured for warehouses, stores, or all?"
      - "Is a Brokering Shipment Threshold set at the product store level?"
      - "Are there maximumOrderLimit values set on facilities?"
    recommendation_format:
      must_open_with: |
        Identify the specific brokering run + rule producing the largest share of unfillable orders,
        named by groupName + routingRuleName + sequenceNum, with absolute count and percent of total.
      each_recommendation_must_name:
        - routing_group (groupName + routingGroupId)
        - one of: routing (routingName + orderRoutingId) OR rule (ruleName + routingRuleId)
        - the specific field being changed (e.g. FACILITY_GROUP filter, BRK_SAFETY_STOCK, unavailableItems.action)
      forbidden_phrasings:
        - "consider"
        - "you could"
        - "try"
        - "might want to"
        - "broaden your filters"   # generic without naming which filter on which rule
      minimum_specificity: |
        A recommendation is acceptable only if a reader could open the run, find the named rule,
        and execute the change without re-deriving which entity the advice refers to.
    reasoning_workflow:
      - step: parse_comments
        action: |
          For each entry in toolContext.facility_change_summary.byDestinationFacility
          where facilityId === "UNFILLABLE_PARKING", parse every distinctComment using format
          "${groupName}: [No inventory / Partially available] found for ${ruleName}.[...]"
          and extract (groupName, ruleName, rejectionReason). Discard rows you cannot parse.
          Note: some comments may begin with "Inventory found for ..." despite being on
          UNFILLABLE_PARKING rows. This is a known upstream anomaly — treat the rejectionReason
          as unknown for those rows (do NOT classify them as "No inventory") and rely on
          byRoutingGroup counts for attribution instead.
      - step: lookup_rule_config
        action: |
          For each (groupName, ruleName), find the rule in
          pageCapabilityManifest.visibleEntities.brokeringRuns[].routings[].inventoryRules[]
          by matching groupName + ruleName. Read inventoryFilters (BRK_SAFETY_STOCK, FACILITY_GROUP,
          PROXIMITY, MEASUREMENT_SYSTEM, SHIP_THRESHOLD, FACILITY_ORDER_LIMIT), partialAllocation,
          assignmentEnumId, unavailableItems (action, queueId), and sequenceNum.
          Also note whether this rule is the last in its routing (by comparing sequenceNum to other rules).
          The manifest is the authoritative source for sequenceNum — the tool's byRule[] entries
          currently return sequenceNum as undefined due to a known backend gap, so always read
          sequenceNum from the manifest, not from the tool response.
      - step: attribute_impact
        action: |
          From toolContext.facility_change_summary.byRoutingGroup, find the matching group entry
          (byRoutingGroup carries populated groupName + routingGroupId) and within it the matching
          rule under byRule[] by ruleName. Read its unfillable count. Compute
          percent = count / totalUnfillable. Always cite the time window (windowFrom..windowTo)
          when reporting these counts — they are NOT scoped to a single brokering run.
          Do not use the flat top-level byRule[] for attribution because its groupName /
          routingGroupId fields are currently undefined; use it only as a ranking cross-check.
      - step: diagnose_and_prescribe
        action: |
          For each responsible rule, walk rejection_diagnoses in declared order. For each entry
          whose `when` conditions match the rule's current state and the parsed rejectionReason,
          emit one recommendation using the entry's prescription_template, substituting the
          live values (current filter values, computed suggestedValue, impact counts).
          Skip diagnoses whose conditions do not match — do not invent matches.
      - step: order_by_impact
        action: |
          Sort emitted recommendations by the attributed unfillable count (desc).
          Highest-impact rule first. Limit to the top 5.
    rejection_diagnoses:
      - id: tight_safety_stock
        when:
          rejection_reason: "No inventory"
          rule_filter_present: BRK_SAFETY_STOCK
          rule_filter_value_gt: 1
        likely_cause: "Safety stock floor is filtering out facilities that have stock but below the threshold."
        prescription_template: |
          On rule "{ruleName}" (seq {sequenceNum}) in run "{groupName}", BRK_SAFETY_STOCK is set to {currentBRK_SAFETY_STOCK}.
          With "no inventory found" as the rejection reason, this floor is the gate.
          Lower BRK_SAFETY_STOCK to {suggestedValue} on this rule, or remove the filter so any facility with positive ATP qualifies.
          Attribution: this rule produced {ruleUnfillableCount} of {totalUnfillable} unfillable orders ({rulePercent}%).
        suggested_value_logic: "Halve the current value, rounded down, minimum 1."
      - id: narrow_facility_group
        when:
          rejection_reason: "No inventory"
          rule_filter_present: FACILITY_GROUP
          rule_filter_value_size_lte: 2
        likely_cause: "Eligible facility set is too narrow; other brokering groups have available stock."
        prescription_template: |
          On rule "{ruleName}" (seq {sequenceNum}) in run "{groupName}", FACILITY_GROUP is restricted to {currentFACILITY_GROUPNames}.
          Add {suggestedAdditionalGroupName} (from toolContext.brokering_facility_groups) — that group contains {nMembers} facilities currently outside this rule's eligibility.
          Attribution: this rule produced {ruleUnfillableCount} of {totalUnfillable} unfillable orders ({rulePercent}%).
        suggested_value_logic: "Pick the largest brokering facility group (by member count) that is not already in the rule's FACILITY_GROUP filter."
      - id: tight_proximity
        when:
          rejection_reason: "No inventory"
          rule_filter_present: PROXIMITY
        likely_cause: "Geofence excludes facilities outside the radius even when they have stock."
        prescription_template: |
          On rule "{ruleName}" (seq {sequenceNum}) in run "{groupName}", PROXIMITY is {currentPROXIMITY} {measurementSystem}.
          Increase to {suggestedValue} {measurementSystem}, or remove the filter to allow facilities beyond that radius.
          Attribution: this rule produced {ruleUnfillableCount} of {totalUnfillable} unfillable orders ({rulePercent}%).
        suggested_value_logic: "Double the current value. If doubled value exceeds 100 mi / 160 km, suggest removing the filter."
      - id: no_partial_allocation
        when:
          rejection_reason: "Partially available"
          rule_field_eq:
            partialAllocation: false
        likely_cause: "Rule rejects orders when only part of the quantity is fillable from a single facility."
        prescription_template: |
          On rule "{ruleName}" (seq {sequenceNum}) in run "{groupName}", partial allocation is disabled.
          With "partially available" as the rejection reason, enabling partial allocation (assignmentEnumId = "ORA_MULTI") would let split shipments fulfill rather than fall through to unfillable.
          Attribution: this rule produced {ruleUnfillableCount} of {totalUnfillable} unfillable orders ({rulePercent}%).
      - id: no_fallback_rule
        when:
          rejection_reason: "No inventory"
          rule_field_eq:
            unavailableItems.action: "moveToQueue"
            unavailableItems.queueId: "UNFILLABLE_PARKING"
          rule_position: "last_in_routing"
        likely_cause: "Final rule sends unfillable straight to the queue with no fallback rule attempted first."
        prescription_template: |
          Rule "{ruleName}" (seq {sequenceNum}) is the last rule in run "{groupName}" and routes unmatched items directly to UNFILLABLE_PARKING.
          Insert a new fallback rule after seq {sequenceNum} with broader filters (all brokering facility groups, no BRK_SAFETY_STOCK, no PROXIMITY) and partialAllocation = true; move the moveToQueue action to that new fallback rule so "{ruleName}" only falls through when truly nothing is allocatable.
          Attribution: this rule produced {ruleUnfillableCount} of {totalUnfillable} unfillable orders ({rulePercent}%).

  - id: facility_concentration
    user_question_examples:
      - "why is Brooklyn getting so many orders"
      - "why is one facility being assigned everything"
      - "how do I spread orders across facilities"
    intent: recommendation
    requires:
      - facility_change_summary
      - brokering_facility_groups
      - facility_order_limits
    diagnostic_levers:
      - lever: rule_ordering
        explanation: "If the first inventory rule's FACILITY_GROUP filter contains only the concentrated facility, every order qualifying for that rule goes there."
      - lever: missing_caps
        explanation: "Without maximumOrderLimit on the concentrated facility, no mechanism enforces distribution."
      - lever: proximity_sort
        explanation: "A PROXIMITY sort with a narrow customer geography concentrates orders on the closest facility."
    appropriate_clarifying_questions:
      - "Do you want orders distributed by capacity, by proximity to customer, or evenly across the group?"
    inappropriate_clarifying_questions:
      - "Which facility groups contain the concentrated facility?"
      - "Does the concentrated facility have a maximumOrderLimit set?"
    recommendation_format:
      must_open_with: |
        Identify the specific facility receiving the disproportionate share of allocations,
        named by facilityId, with the absolute count and percent of total assignments.
      each_recommendation_must_name:
        - routing_group (groupName + routingGroupId)
        - one of: routing (routingName + orderRoutingId) OR rule (ruleName + routingRuleId)
        - the specific field being changed (e.g. FACILITY_GROUP membership, PROXIMITY radius, maximumOrderLimit on the named facility)
      forbidden_phrasings:
        - "consider"
        - "you could"
        - "try"
        - "might want to"
        - "spread your orders"   # generic without naming which facility or which rule
      minimum_specificity: |
        A recommendation is acceptable only if a reader could open the run, find the named rule,
        and execute the change without re-deriving which facility or rule the advice refers to.

  - id: environmental_audit_overview
    user_question_examples:
      - "what facility groups do I have"
      - "what brokering settings are configured"
      - "is the shipment threshold set"
      - "which facilities have order caps"
    intent: environmental_audit
    requires:
      - brokering_facility_groups
      - product_store_settings
      - facility_order_limits
    diagnostic_levers: []
    appropriate_clarifying_questions: []
    inappropriate_clarifying_questions:
      - "Which facility groups are configured?"
      - "Is a Brokering Shipment Threshold set?"
      - "Are there maximumOrderLimit values?"


# ─────────────────────────────────────────────────────────────────────────────
# MERCHANT PAIN SIGNALS
# Pain-language a merchant uses → underlying goal + recommended configuration
# direction. Sourced from HotWax customer-facing marketing materials and
# observed conversations. The agent should treat these phrases as triggers
# that disambiguate intent before recommending changes.
# ─────────────────────────────────────────────────────────────────────────────

merchant_pain_signals:

  description: >
    Retailers rarely describe their problem in routing-engine terms. They
    describe the business symptom. This section maps the symptoms HotWax
    sees most often to the underlying routing concept and the agent's
    next move. The phrases in `triggers` are paraphrases — match by
    meaning, not by literal string.

  rising_shipping_cost:
    triggers:
      - "shipping costs are killing margin"
      - "freight bill keeps going up"
      - "carrier rates went up again"
      - "we're shipping too far for what the order is worth"
      - "small orders are eating profit"
    underlying_concept: ProximityVsInventoryBalance + Brokering Shipment Threshold
    business_outcome_at_stake: "Margin per order"
    agent_next_move: >
      Ask whether the cost is driven by (a) long-distance shipments
      (proximity issue), (b) split shipments on low-value orders
      (shipment threshold issue), or (c) carrier zone jumps from the wrong
      facility being picked. The diagnosis branches sharply on which one.

  hidden_inventory:
    triggers:
      - "we have stock somewhere but orders are still going unfillable"
      - "the warehouse showed inventory but the order failed"
      - "shopify says we're out of stock when we aren't"
      - "we're sitting on inventory we're not selling"
      - "stock isn't being seen by the system"
    underlying_concept: >
      Either (a) FacilityGroup filter too narrow, (b) BrokeringSafetyStock
      floor too high, (c) MaximumOrderLimit hit, or (d) the facility is
      not enabled for online fulfillment / not in the Brokering_Group.
    business_outcome_at_stake: "Fulfillment rate; sellthrough"
    agent_next_move: >
      Map to diagnostic_pattern: high_unfillable_rate. Walk the unfillable
      attribution by rule and surface the specific filter that is blocking
      eligible facilities.

  overloaded_busy_stores:
    triggers:
      - "the times square store is drowning"
      - "one store gets all the orders"
      - "our flagship can't keep up"
      - "associates are buried in pick lists"
      - "store performance is suffering because of online volume"
    underlying_concept: >
      Missing or undersized MaximumOrderLimit on the concentrated facility;
      or absent Inventory Balance sort; or facility ordering forces all
      orders to the same nearest location.
    business_outcome_at_stake: "Store experience, walk-in conversion, payroll efficiency"
    agent_next_move: >
      Map to diagnostic_pattern: facility_concentration. Ask whether
      distribution should follow capacity, proximity, or inventory balance
      — these are mutually exclusive resolutions.

  lost_full_price_window:
    triggers:
      - "we end up marking it down"
      - "by the time it sold, we'd already gone on sale"
      - "aging stock we should have moved"
      - "broken sizes sitting at flagship"
      - "we missed the full-price window"
    underlying_concept: BrokenStyle sort + CustomSequence routing toward overstocked locations
    business_outcome_at_stake: "Full-price sellthrough; markdown avoidance"
    agent_next_move: >
      Recommend a routing rule that uses BrokenStyle (or InventoryBalance DESC
      with a CustomSequence biased to overstocked / underperforming stores)
      for standard / non-expedited orders. Do not apply this to expedited
      orders — speed beats margin for those.

  broken_delivery_promises:
    triggers:
      - "we keep missing same-day"
      - "orders ship late"
      - "SLA is slipping"
      - "expedited gets buried with standard"
      - "two-day arrives in four"
    underlying_concept: >
      Frequency too low for urgent orders, OR urgent and standard orders in
      the same routing rule with no shipment-method separation, OR proximity
      radius too wide allowing slow facilities to win.
    business_outcome_at_stake: "Customer trust, refund rate, repeat purchase"
    agent_next_move: >
      Recommend a dedicated high-priority BrokeringRun on a sub-15-minute
      schedule with a separate routing rule filtered to expedited shipment
      methods, sorted by ShippingMethod then OrderDate, with Proximity sort
      on the inventory rule.

  inventory_aging:
    triggers:
      - "before markdowns"
      - "stock sitting too long"
      - "aging at certain stores"
      - "we need to move it before it goes on sale"
    underlying_concept: BrokenStyle sort or CustomSequence + InventoryBalance DESC
    business_outcome_at_stake: "Markdown rate, gross margin"
    agent_next_move: >
      Same as lost_full_price_window — bias routing toward facilities with
      the stock the merchant is trying to clear. Confirm whether they want
      it for ALL orders or only standard / non-expedited.

  protect_in_store_experience:
    triggers:
      - "protect walk-in inventory"
      - "shelves are empty when customers come in"
      - "store associates are focused on VIP clients"
      - "we don't want online orders pulling from the floor"
      - "keep stock for foot traffic"
    underlying_concept: BrokeringSafetyStock + MaximumOrderLimit on store facilities
    business_outcome_at_stake: "In-store conversion, brand experience"
    agent_next_move: >
      Recommend BrokeringSafetyStock on store-group inventory rules and
      a maximumOrderLimit on the affected stores. Place store group later
      in the inventory-rule sequence so warehouses are tried first.

  flash_sale_chaos:
    triggers:
      - "black friday broke our routing"
      - "we couldn't keep up with cyber monday"
      - "during the drop everything went unfillable"
      - "weather hit one region and orders piled up"
    underlying_concept: Dedicated seasonal BrokeringRun with high-frequency schedule
    business_outcome_at_stake: "Peak-period revenue capture"
    agent_next_move: >
      Map to retail_model_archetypes.seasonal_peaks. Recommend a separate
      run kept in Draft off-peak, activated during the event, with a
      sub-15-minute schedule and partial allocation enabled earlier in the
      inventory rule sequence than usual.


# ─────────────────────────────────────────────────────────────────────────────
# ROUTING DECISION TRADE-OFF AXES
# The five trade-off axes that merchants think along when they configure
# routing. Sourced from HotWax marketing: "How retailers actually think
# about routing." These axes do NOT replace the existing goals_and_preferences
# section — they live alongside it as a mental-model layer that helps the
# agent disambiguate which goal a merchant is implicitly invoking.
# ─────────────────────────────────────────────────────────────────────────────

routing_decision_axes:

  preamble: >
    Routing is rarely just a technical decision. It is a retail decision.
    Merchants instinctively reason along these five axes. The agent's job
    is to recognise which axis a merchant has activated in their request,
    then map it to the configuration that resolves it the way they want.

  proximity_vs_inventory_health:
    question_form: "Ship from nearby, or from a location rich in stock?"
    tension: >
      Nearby = faster, cheaper carrier zone, but the closest facility may
      have only one unit left (rejection risk, broken-style risk).
      Inventory-rich = safer fulfillment, lower split risk, but longer
      transit and possibly higher freight.
    typical_resolution:
      expedited_orders: Proximity wins.
      standard_orders: Inventory Balance (or Broken Style) wins.
    related_goals: [MeetDeliverySLA, MinimiseShippingCost, MaximiseFulfillmentRate]
    agent_pattern: >
      If the merchant mentions both speed AND stock health in the same
      breath, separate them into two routing rules by shipment method
      rather than trying to satisfy both axes in one rule.

  order_promise_vs_operational_simplicity:
    question_form: "Split the order now to meet the promise, or wait and ship it whole?"
    tension: >
      Splitting fulfils the SLA but increases pick-pack labour, packaging
      cost, and customer perception of "why did this arrive in 3 boxes?"
      Holding the order together keeps operations simple but risks SLA miss.
    typical_resolution:
      VIP_or_high_priority: Split (SLA wins).
      low_value_or_low_priority: Hold (Shipment Threshold guards splits).
    related_goals: [MeetDeliverySLA, ReduceOperationalOverhead, MinimiseShippingCost]
    agent_pattern: >
      Brokering Shipment Threshold is the lever for "don't split low-value
      orders." Order priority filter is the lever for "do split for VIP."

  product_type_vs_location:
    question_form: "Should this product ship from any location, or only from approved ones?"
    tension: >
      Some products (luxury SKUs, fragile goods, regulated items, kits)
      should only ship from facilities trained to handle them. Other
      products can ship from anywhere with stock.
    typical_resolution: >
      Create a CustomSequence or restrictive FacilityGroup for the
      sensitive products; route them in their own routing rule. Allow the
      rest of the catalogue a broader inventory pool.
    related_goals: [ProtectInStoreInventory, ReduceOperationalOverhead]
    agent_pattern: >
      Ask whether the constraint is about product category, brand, price
      band, or specific SKUs — the mechanism differs. HotWax does not
      filter by product category directly inside a routing rule; the
      typical workaround is to put gated products in a separate routing
      run or rely on Shopify-side channel/location restriction.

  store_experience_vs_customer_experience:
    question_form: "Protect the in-store shopper, or fulfil the online customer?"
    tension: >
      Pulling store stock for online orders satisfies the online customer
      but hollows shelves for walk-ins. Reserving stock for walk-ins keeps
      store experience intact but may leave online orders unfillable.
    typical_resolution: >
      Brokering Safety Stock floor on store facilities + MaximumOrderLimit
      cap. Stores act as fallback, warehouses as primary.
    related_goals: [ProtectInStoreInventory, MeetDeliverySLA]
    agent_pattern: >
      "Walk-in" or "VIP clientele" or "foot traffic" language strongly
      signals this axis. The merchant is implicitly asking the agent to
      protect a non-routing KPI (store conversion).

  store_performance_vs_inventory_turnover:
    question_form: "Route to top-performing stores, or to ones that need the volume?"
    tension: >
      Top-performing stores are operationally reliable but already have
      healthy sellthrough — adding online volume risks overload and
      double-dipping on their best sellers. Underperforming stores benefit
      from any volume, and aging stock there is at markdown risk.
    typical_resolution: >
      For standard orders, bias routing toward underperforming /
      overstocked locations using CustomSequence or BrokenStyle sort.
      For expedited, keep going to reliable performers.
    related_goals:
      - OptimiseFulfillmentCostByRentAgreement
      - BalanceInventoryAcrossNetwork
      - "(new) ClearAgingInventory"
    agent_pattern: >
      "Aging stock", "broken sizes", "underperforming store", "move it
      before markdown" all point here. Pair with the standard_orders
      sequencing pattern, not the expedited one.


# ─────────────────────────────────────────────────────────────────────────────
# RETAIL MODEL ARCHETYPES
# Different retail business models route differently. The agent should
# recognise which archetype the merchant fits and bias recommendations
# accordingly. Sourced from "Different models, different routing logic"
# section of the HotWax marketing booklet.
# ─────────────────────────────────────────────────────────────────────────────

retail_model_archetypes:

  preamble: >
    Every retail model routes differently. Identifying the archetype is the
    fastest way to narrow the configuration space. When a merchant describes
    their business, listen for the archetype signal first, then map to the
    associated bias.

  expanding_dtc:
    summary: "Speed is non-negotiable. Volume is unpredictable."
    signals:
      - "direct-to-consumer"
      - "DTC brand"
      - "drops"
      - "limited releases"
      - "we ship same-day"
      - "growing fast / scaling"
      - "founder-led brand"
    routing_bias:
      schedule: "Sub-15-minute (every 5 min during peak events)"
      priority: "Express and VIP routing rules at sequence 1"
      splits: "Allow only when needed to meet SLA"
      facilities: "Both stores and warehouses to balance load"
      capacity: "MaximumOrderLimit on stores to skip when overloaded"
    canonical_configuration:
      - "BrokeringRun: 'Peak DTC' on */5 cron during drops, hourly otherwise"
      - "RoutingRule 1: Expedited (Same-Day, Next-Day) → Proximity sort"
      - "RoutingRule 2: Standard → InventoryBalance sort"
      - "InventoryRule: Warehouses preferred, stores as fallback with MaximumOrderLimit"

  premium_or_luxury:
    summary: "Experience and control are top priority."
    signals:
      - "luxury"
      - "premium"
      - "high-end"
      - "exclusive SKUs"
      - "VIP clientele"
      - "concierge / clienteling"
      - "white glove"
      - "brand positioning"
    routing_bias:
      schedule: "Standard frequency — speed matters less than control"
      facilities: "Warehouses by default; only trained / certified stores allowed for store fulfillment"
      safety_stock: "High BrokeringSafetyStock on stores to keep shelves stocked for walk-ins"
      splits: "Minimise splits — luxury orders should arrive in one package"
      product_routing: >
        Exclusive SKUs ship only from warehouses; discounted SKUs avoid
        flagship stores to protect brand positioning.
    canonical_configuration:
      - "RoutingRule 1: Exclusive SKUs (or full-price) → Warehouse-only inventory rule"
      - "RoutingRule 2: All other orders → Certified stores + warehouses, BrokeringSafetyStock ≥ 3"
      - "AllowPartialAllocation: false in primary rule; only true in final fallback"

  multi_brand_omnichannel:
    summary: "Hundreds of locations. Wide store variety."
    signals:
      - "department store"
      - "multi-brand"
      - "many locations"
      - "regional differences"
      - "different store concepts"
      - "varying store performance"
    routing_bias:
      facilities: "Favour underperforming or overstocked stores to protect margin"
      load_management: "Reduce fulfillment load from top-performing retail locations"
      customisation: "Per-region, per-brand, or per-demographic routing rules"
      sort: "BrokenStyle or CustomSequence biased toward overstocked locations"
    canonical_configuration:
      - "Multiple BrokeringRuns segmented by region or brand"
      - "Each routing rule uses CustomSequence with underperforming stores high in priority"
      - "Top-performing flagships placed late in sequence or capped via MaximumOrderLimit"

  seasonal_peaks:
    summary: "Inventory is static. Demand is not."
    signals:
      - "Black Friday"
      - "Cyber Monday"
      - "holiday season"
      - "clearance"
      - "peak"
      - "surge"
    routing_bias:
      schedule: "Dedicated seasonal BrokeringRun kept in Draft off-peak, Active during peak"
      override: "Temporarily allow splits and longer distances during surges"
      pause: "Often pause or downshift the daily run to avoid double-processing"
    canonical_configuration:
      - "Holiday BrokeringRun (Draft → Active manually before peak)"
      - "Schedule: */5 6-23 * * * (every 5 min during business hours)"
      - "Inventory rule 1: Warehouses only"
      - "Inventory rule 2: Selected fallback stores"
      - "Daily run set to Draft for the duration of the peak"

  regional_demand_spikes:
    summary: "Drops. Weather. Anything can change the map."
    signals:
      - "product drop"
      - "weather event"
      - "regional surge"
      - "viral moment"
      - "one region spiking"
    routing_bias:
      schedule: "Tighten frequency in the impact zone only"
      facilities: "Shift fulfillment to adjacent regions or DCs"
      local_protection: "Avoid overloading local stores in the impact zone"
    canonical_configuration:
      - "Add or activate a routing rule with OriginFacilityGroup filtered to the surge region"
      - "Inventory rule expands to adjacent regional DCs ahead of local stores"
      - "MaximumOrderLimit on local stores to force overflow outward"


# ─────────────────────────────────────────────────────────────────────────────
# FACILITY TAXONOMY
# Common FacilityGroup configurations seen across HotWax customers, with
# the typical reason each group exists. The agent must NEVER assume a group
# exists without confirming, but should recognise these names when the
# merchant mentions them — they are industry-standard categories, not
# HotWax inventions.
# ─────────────────────────────────────────────────────────────────────────────

facility_taxonomy:

  preamble: >
    The Facility App lets merchants classify facilities however they want,
    but the booklet documents eight common groupings that recur across
    customers. Recognise the noun the merchant uses; map to the group;
    confirm it exists before recommending it in a filter.

  common_groupings:

    warehouses:
      definition: "Central and regional distribution centers."
      typical_role: "Primary fulfillment for online orders; high capacity."
      routing_role: "Usually first in the inventory rule sequence."
      aliases: ["DC", "distribution center", "warehouse", "fulfillment center", "FC"]

    retail_stores:
      definition: "Store-based fulfillment locations."
      typical_role: "Fallback after warehouses; surface area for ship-from-store (SFS) and BOPIS."
      routing_role: "Later in inventory rule sequence; often with safety stock + order limits."
      aliases: ["stores", "retail", "ship-from-store", "SFS", "physical store"]

    same_day_enabled:
      definition: "Locations equipped for same-day delivery within their service area."
      typical_role: "Local delivery from urban / dense locations."
      routing_role: "Filtered into the Same-Day shipment-method routing rule."
      aliases: ["same-day", "local delivery", "rapid delivery"]

    large_format_stores:
      definition: "Stores with higher inventory and staffing capacity."
      typical_role: "Can absorb online volume without disrupting walk-in service."
      routing_role: "Preferred store-tier in fallback sequence."
      aliases: ["flagship", "anchor store", "destination store"]

    mall_based_stores:
      definition: "Stores located inside shopping malls."
      typical_role: >
        Subject to mall hours, mall commission/rent, and pickup restrictions
        (mall security may block carrier loading after hours).
      routing_role: >
        Often EXCLUDED during peak season or for expedited orders;
        deprioritised when rent agreements include commission triggers.
      aliases: ["mall stores", "in-mall locations"]

    store_in_store:
      definition: "Locations inside department stores or airports."
      typical_role: "Limited hours, limited operational autonomy, complex receiving."
      routing_role: "Usually excluded from primary inventory rules."
      aliases: ["concession", "shop-in-shop", "store-within-a-store"]

    underperforming_stores:
      definition: "Stores with low foot traffic or high aging inventory."
      typical_role: "Margin-protection target — surface online volume to clear inventory."
      routing_role: >
        Preferred for standard / non-expedited orders to move aging stock
        before markdowns. Pair with BrokenStyle or InventoryBalance sort.
      aliases: ["aging-stock stores", "slow stores", "C/D stores"]

    new_stores:
      definition: "Recently opened locations with less established foot traffic."
      typical_role: "Need volume to build operational rhythm; have spare capacity."
      routing_role: "Can be biased into routing to help ramp the location."
      aliases: ["new locations", "newly opened", "ramp stores"]

  personalized_lookup_examples:
    description: >
      Filter combinations that recur in HotWax customer configurations.
      Each is built from FacilityGroup + supporting filters.
    examples:
      - intent: "Route most orders only to large-format stores or warehouses"
        configuration: "FacilityGroup INCLUDE: [Warehouses, Large-format stores]"

      - intent: "Use only same-day enabled stores for local delivery"
        configuration: >
          RoutingRule filter: ShipmentMethodType = Same-Day.
          InventoryRule filter: FacilityGroup = Same-day enabled stores.

      - intent: "Route East Coast orders to Virginia stores"
        configuration: >
          Requires a regional FacilityGroup (e.g. East_Coast_Stores or
          Virginia_Stores). InventoryRule filter: FacilityGroup = the
          regional group. Routing rule may also need an OriginFacilityGroup
          filter if differentiating by where the order was placed.

      - intent: "Exclude mall-based stores during holiday season"
        configuration: >
          Use the Exclude tab on FacilityGroup with Mall-based stores selected.
          Typically combined with a seasonal BrokeringRun.

      - intent: "Exclude flagship stores during in-store events"
        configuration: >
          Use the Exclude tab on FacilityGroup with Flagship / Large-format
          stores selected, OR set MaximumOrderLimit on those facilities to
          a low value for the duration of the event.


# ─────────────────────────────────────────────────────────────────────────────
# MERCHANT DECISION DILEMMAS
# The "Would you rather" scenarios from the marketing booklet, mapped to the
# routing axes and configuration choices they imply. Useful for the agent
# when a merchant frames a question as a tension rather than a request.
# ─────────────────────────────────────────────────────────────────────────────

merchant_decision_dilemmas:

  preamble: >
    Merchants often surface routing intent as a dilemma, not a directive.
    The booklet captures five canonical dilemmas. Each maps to a routing
    axis above; the agent's job is to pick up the axis from the phrasing
    and ask which side of the tension the merchant prefers — not to
    invent a default.

  aging_stock_vs_foot_traffic:
    dilemma: "Ship from a store with aging stock, or protect that store's daily in-store traffic and revenue?"
    axis: store_performance_vs_inventory_turnover
    resolution_questions:
      - "Is this store underperforming or is foot traffic high?"
      - "Are we trying to clear before markdown, or maintain shelf depth?"
    if_aging_priority_wins:
      configuration: "Route this store first; BrokenStyle sort; no BrokeringSafetyStock"
    if_foot_traffic_priority_wins:
      configuration: "Add this store to a high-safety-stock group; cap with MaximumOrderLimit"

  vip_split_now_vs_wait_for_whole:
    dilemma: "Fulfil a VIP order now by splitting across 3 stores, or wait one day to ship whole from a warehouse?"
    axis: order_promise_vs_operational_simplicity
    resolution_questions:
      - "What is the SLA?"
      - "What is the order value vs the cost of a 3-way split?"
    if_SLA_wins:
      configuration: >
        Allow partial allocation in early inventory rule for VIP /
        expedited orders; sort by Proximity; tolerate the split.
    if_simplicity_wins:
      configuration: >
        Disable partial allocation in early rules; route through
        warehouses first; expose Brokering Shipment Threshold to gate
        splits to high-value orders only.

  mall_nearby_vs_DC_farther:
    dilemma: "Use a mall-based store that's nearby but has pickup restrictions, or ship from a regional DC that's further but faster?"
    axis: proximity_vs_inventory_health
    resolution_questions:
      - "What are the mall's pickup restrictions and how do they affect this carrier?"
      - "Is the SLA tight enough that 'further' breaks it?"
    if_mall_chosen:
      configuration: "Include mall-based group; sort by Proximity"
    if_DC_chosen:
      configuration: >
        Exclude mall-based group OR push it later in the inventory rule
        sequence; warehouses preferred at sequence 1.

  luxury_store_vs_warehouse_only:
    dilemma: "Route luxury SKUs from a store that just got trained for fulfillment, or stick to warehouse-only until post-holiday?"
    axis: product_type_vs_location
    resolution_questions:
      - "Is the store fully certified / quality-controlled?"
      - "Is this a high-volume period where the warehouse may bottleneck?"
    if_store_trusted:
      configuration: "Add store to a 'Luxury-certified' FacilityGroup; route luxury SKUs through that group"
    if_play_it_safe:
      configuration: >
        Keep luxury routing rule's FacilityGroup filter restricted to
        Warehouses; revisit after the season.

  overload_top_store_vs_risk_underperformer:
    dilemma: "Overload your top-performing NYC store to meet delivery timelines, or route to an underperforming NJ store and risk delay?"
    axis: store_performance_vs_inventory_turnover
    resolution_questions:
      - "Is the SLA tighter than the NJ store's operational reliability can support?"
      - "How close is NYC to MaximumOrderLimit already?"
    if_speed_wins:
      configuration: "Keep NYC primary; raise or remove MaximumOrderLimit; accept the operational risk"
    if_distribution_wins:
      configuration: "Lower MaximumOrderLimit on NYC; bias NJ via CustomSequence or InventoryBalance"

  observed_priority_axes:
    description: >
      The booklet's quiz prompts merchants to count how many times they
      picked each axis. The three axes that emerge are also useful agent
      signals about the merchant's implicit value system.
    axes:
      - speed_over_cost: "SLA wins over freight cost. Common for DTC and luxury."
      - proximity_over_performance: "Closest wins over store reliability. Common for same-day."
      - margin_over_experience: >
          Margin wins over either store or customer experience.
          Common for off-price, multi-brand, and large multi-store operators.


# ─────────────────────────────────────────────────────────────────────────────
# STATIC vs OMNICHANNEL ROUTING
# A diagnostic layer to help the agent recognise when a merchant is still
# operating in a "static routing" mindset. Static-routing language is a
# strong signal that the merchant's existing setup will not survive a
# peak, a drop, or a regional spike.
# ─────────────────────────────────────────────────────────────────────────────

static_vs_omnichannel_routing:

  static_routing:
    definition: >
      Routing logic that doesn't adapt to real-time conditions. The set of
      rules most legacy brands still use.
    common_rules:
      - "Always ship from the closest location with any stock"
      - "Manually ranked list of fulfillment locations"
      - "If inventory is not available anywhere, split to the nearest available locations"
    why_it_breaks:
      - "Inventory movements (restocks, transfers) aren't reflected"
      - "Regional demand shifts from promotions overload some facilities and starve others"
      - "Store performance changes (staffing, hours, capacity) aren't accounted for"
    consequences_when_it_breaks:
      - "Rising shipping costs (orders ship from suboptimal facility)"
      - "Unfulfilled orders despite inventory existing somewhere"
      - "Overloaded busy stores while others sit idle"
      - "Lost full-price selling windows (aging stock not surfaced for fulfillment)"
      - "Broken delivery promises"
    agent_recognition_signals:
      - "we just route to the closest store"
      - "we have a fixed priority list"
      - "we ship from wherever has stock"
      - "we split to the nearest if it's not all in one place"

  omnichannel_routing:
    definition: >
      Routing logic that turns business logic into automated decisions and
      adapts to changing conditions in real time.
    five_pillars_evaluated_per_order:
      - inventory_health: "Where is stock actually available and at what depth?"
      - fulfillment_capacity: "Can this facility actually absorb the order today?"
      - promised_SLA: "What delivery window did the customer pay for?"
      - order_priority: "Is this VIP / expedited / standard?"
      - order_item_value: "Is splitting worth the freight overhead for this order's value?"
    the_four_step_process:
      - 1_timing: >
          Schedule the brokering run. Hot orders (same-day, VIP) in near
          real-time; standard / lower priority in hourly batches. Staggered
          timing keeps routing efficient without missing delivery windows.
      - 2_batching: >
          Group orders so they can be routed strategically. Batch by
          priority, shipping method, promise date, sales channel, even
          product category. Common batches: new expedited, new standard,
          rejected (previous-attempt failures), unfillable waiting on
          new inventory.
      - 3_evaluate: >
          For each batch, decide which stores or warehouses to route to.
          Not just "which has stock" — which makes the most sense right
          now. Filters used: shipment threshold check, brokering safety
          stock, facility group, proximity, exclusions.
      - 4_fallbacks: >
          Define what happens when no single location can ship. Expand
          the pool to fallback stores, allow splits if shipment value
          justifies it, move to unfillable parking for re-routing later,
          or auto-cancel after N days.

  agent_messaging_pattern: >
    If the merchant's request reveals a static-routing mindset, gently
    surface the trade-off (don't lecture). Example: "It sounds like the
    current rules ship to the closest store. That works on a quiet
    Tuesday but tends to overload busy stores during a sale. Want me to
    show what a batch-by-shipment-method setup would change?"


# ─────────────────────────────────────────────────────────────────────────────
# RETAILER VOICE AND TERMINOLOGY
# Vocabulary HotWax customers actually use, with the routing concept each
# term maps to. The agent should recognise these terms even when they
# don't appear in HotWax's own UI labels.
# ─────────────────────────────────────────────────────────────────────────────

retailer_voice_and_terminology:

  preamble: >
    Retailers use industry vocabulary, not HotWax UI labels. The agent
    must recognise the term and translate to the underlying concept
    before answering. Listed below: term → concept mapping with brief
    context where the term is ambiguous.

  fulfillment_terms:
    "ship-from-store / SFS": "Inventory rule routes to RETAIL_STORE facilities"
    "BOPIS": "Buy Online Pick Up In Store — fulfilled by a specific customer-selected store; out of brokering scope (BOPISFacilityLock)"
    "BORIS": "Buy Online Return In Store — affects facility QOH on associate acceptance, not customer initiation"
    "send sale": "Order placed by a store associate on behalf of a walk-in customer; OriginFacilityGroup filter applies"
    "endless aisle": "Customer in-store orders fulfilled from another location — typically a send sale"
    "DC / distribution center": "Warehouse facility"
    "split shipment / split order": "AllowPartialAllocation = true outcome"
    "single-package / ship complete": "AllowPartialAllocation = false; AllItemsAvailableAnywhere = true"

  inventory_terms:
    "broken size / broken style": "Fragmented inventory; map to BrokenStyle sort or aging-stock routing"
    "aging stock": "Inventory that risks markdown; map to BrokenStyle or InventoryBalance DESC routing"
    "sellthrough": "Rate at which inventory sells; full-price sellthrough is the margin-protected metric"
    "full-price window": "Period before markdown; routing should clear aging stock during this window"
    "safety stock": >
      Ambiguous. Could mean (a) Online ATP Safety Stock (Shopify-published
      buffer), (b) Brokering Safety Stock (per-rule minimum for facility
      eligibility), or (c) per-SKU velocity-based safety stock (higher buffer
      on fast-moving SKUs). Always disambiguate which one the merchant means.
    "walk-in inventory": "Stock reserved for in-store customers; Brokering Safety Stock floor"
    "ATP / available-to-promise": "QOH minus reservations; what the brokering engine uses"
    "high-velocity SKU": >
      Fast-moving product where stockout risk is high. Calls for higher
      safety-stock buffers — typically configured per-product, not per-rule.
    "new launches": >
      Limited-edition, high-demand product releases. Merchants typically
      want these shipped from warehouses initially (capacity + control),
      moving to store fulfillment after demand stabilises. Implemented via
      product-tag-scoped routing rules where supported.
    "global inventory threshold": >
      A per-product buffer that prevents overselling across channels.
      Distinct from per-rule BrokeringSafetyStock — this one is global to
      the product and applies regardless of routing rule.
    "partial rejection": >
      Action where the facility rejects unavailable items from an order but
      fulfils the remaining items. Prevents the whole order being delayed
      by one OOS line. Distinct from partial allocation (which is about
      splitting across facilities, not rejecting items).
    "collateral rejection / auto-reject related items": >
      When a facility rejects an item, automatically reject the matching
      items from all OTHER open orders at the same store so they can be
      rerouted in bulk to facilities that have stock. Prevents cascading
      delays when one store has a stockout.
    "fallback location": >
      A facility that does NOT participate in primary online fulfillment
      but is eligible as a last-resort destination when no other location
      can fulfil. Implemented as a dedicated FacilityGroup referenced only
      in the final inventory rule.

  operational_terms:
    "drop": "Limited-product release event; map to seasonal_peaks archetype"
    "waterfall": "Sequenced inventory rule lookup with progressive expansion"
    "tie-breaker": "Secondary sort criterion when primary sort produces ties"
    "carrier zone": "Distance bucket carriers use for rate calculation; proximity directly impacts this"
    "loading difficulty / dock access": >
      Not a HotWax-modelled concept directly but motivates CustomSequence
      or exclusion of mall-based / store-in-store facilities.

  performance_terms:
    "top-performing store": "High sellthrough store; usually capped via MaximumOrderLimit"
    "underperforming store": "Low-volume store; biased into routing to ramp it / clear aging stock"
    "anchor store / flagship": "Largest, often experience-led store; treated as Large-format in taxonomy"
    "VIP clientele": >
      Customers whose store experience is prioritised; signals
      BrokeringSafetyStock floor and MaximumOrderLimit on that store.

  brand_voice_phrases:
    description: >
      Phrases HotWax uses to frame the value of omnichannel routing.
      The agent should not parrot marketing language back at users but
      should recognise it if a merchant references it.
    phrases:
      - "every routing decision has a business impact"
      - "routing that thinks like your team"
      - "turning business logic into automated decisions"
      - "static routing breaks down"
      - "find the best fulfillment location at that moment in time"
      - "routing balances at every step"
      - "sell more full-price inventory"
      - "sell more, deliver fast, spend less"
      - "configure, test, apply"
      - "plan, assign, review"
      - "never split until you have to"
      - "100+ routing logics to choose from"


# ─────────────────────────────────────────────────────────────────────────────
# ADDITIONAL GOALS (extending goals_and_preferences)
# Goals surfaced in the marketing booklet that weren't previously enumerated
# in goals_and_preferences.primary_goals. Adding here rather than mutating
# the existing block to keep prior references stable.
# ─────────────────────────────────────────────────────────────────────────────

additional_goals:

  ClearAgingInventory:
    description: >
      Move broken sizes, aging stock, and overstocked SKUs through online
      fulfillment before they age into markdown territory.
    signals:
      - merchant_mentions: ["aging stock", "broken sizes", "before markdown", "full-price window", "stock sitting too long"]
    configuration_implications:
      - BrokenStyle sort on facility sorting for standard orders
      - CustomSequence biased toward overstocked / underperforming locations
      - DO NOT apply to expedited orders — speed beats margin there
      - Pair with InventoryBalance DESC as tie-breaker

  AdaptToRealTimeConditions:
    description: >
      Routing that adapts to changing inventory, demand, and capacity in
      real time rather than relying on static priority lists.
    signals:
      - merchant_mentions: ["adapt", "real-time", "changing conditions", "respond to surge", "dynamic"]
    configuration_implications:
      - Multiple BrokeringRuns segmented by priority / shipment method
      - Higher-frequency schedules for hot orders (every 5-15 min)
      - Seasonal / event runs that can be activated/paused
      - Use Test Drive to verify rules before activating

  ProtectFullPriceSellthrough:
    description: >
      Avoid routing online orders to facilities where they would deplete
      stock destined for full-price walk-in sales.
    signals:
      - merchant_mentions: ["protect full-price", "don't cannibalise stores", "save it for walk-ins"]
    configuration_implications:
      - Warehouses prioritised before stores in inventory rule sequence
      - BrokeringSafetyStock floor on store-tier inventory rules
      - MaximumOrderLimit on top-performing flagships

  HandleRegionalDemandShifts:
    description: >
      Shift routing logic in response to regional demand changes (weather,
      product drops, local events) without manually rewriting rules each time.
    signals:
      - merchant_mentions: ["weather", "drop", "viral", "one region", "regional surge"]
    configuration_implications:
      - Use OriginFacilityGroup filter for region-scoped routing
      - Maintain pre-built BrokeringRuns kept in Draft, activated as needed
      - Bias inventory rule facility groups toward adjacent / non-impacted regions


# ─────────────────────────────────────────────────────────────────────────────
# CANONICAL CONFIGURATIONS (from the marketing booklet)
# Two complete configurations the booklet presents as reference setups:
# expedited routing and regular routing. These extend the use_cases section
# above with whole-routing-rule blueprints rather than single-scenario configs.
# ─────────────────────────────────────────────────────────────────────────────

canonical_configurations:

  expedited_routing:
    purpose: >
      Reference configuration for orders where SLA is non-negotiable —
      overnight, two-day, same-day. Pulls from both new orders and rejected
      orders so failed expedited orders are retried promptly.
    routing_rule:
      name: "Expedited routing"
      order_filter:
        Queue: [Brokering_Queue, Rejected_Parking]
        ShipmentMethodType: [Overnight, Two-day]
      order_sort: [ShippingMethod, OrderDate]
    inventory_rules:
      - sequence: 1
        name: "Warehouse only"
        inventory_filter: { FacilityGroup: Warehouses, Proximity: 150_miles }
        facility_sort: [Proximity, InventoryBalance]
        actions: { partial_allocation: false, unavailable: next_rule }

      - sequence: 2
        name: "Warehouses and stores"
        inventory_filter:
          FacilityGroup: { include: [Warehouses, Stores], exclude: [Mall-based stores] }
          Proximity: 150_miles
          BrokeringSafetyStock: ">=5"
        facility_sort: [Proximity, InventoryBalance]
        actions: { partial_allocation: false, unavailable: next_rule }

      - sequence: 3
        name: "All locations"
        inventory_filter: { FacilityGroup: All_locations }
        facility_sort: [Proximity, InventoryBalance]
        actions: { partial_allocation: false, unavailable: next_rule }

      - sequence: 4
        name: "All locations, allow split"
        inventory_filter: { FacilityGroup: All_locations }
        facility_sort: [Proximity, InventoryBalance]
        actions: { partial_allocation: true, unavailable: "Unfillable Parking" }
    notes:
      - "Auto-reroute is configured on the unfillable parking outcome."
      - "BrokeringSafetyStock is applied only in rule 2 — it protects walk-in stock without blocking allocation outright."
      - "Mall-based stores excluded in rule 2 due to loading restrictions on expedited carriers."

  regular_routing:
    purpose: >
      Reference configuration for standard / non-expedited orders where
      margin protection matters more than delivery speed. Biases toward
      broken-style clearance and uses a wider proximity radius.
    routing_rule:
      name: "Regular routing"
      order_filter:
        Queue: [Brokering_Queue]
        ShipmentMethodType: [Standard]
      order_sort: [OrderDate]
    inventory_rules:
      - sequence: 1
        name: "Warehouse only"
        inventory_filter: { FacilityGroup: Warehouses, Proximity: 300_miles }
        facility_sort: [Proximity, BrokenStyle]
        actions: { partial_allocation: false, unavailable: next_rule }

      - sequence: 2
        name: "Warehouses and select stores"
        inventory_filter:
          FacilityGroup: [Warehouses, Large-format stores, Underperforming stores]
          Proximity: 300_miles
        facility_sort: [Proximity, BrokenStyle]
        actions: { partial_allocation: false, unavailable: next_rule }

      - sequence: 3
        name: "All locations"
        inventory_filter: { FacilityGroup: All_locations }
        facility_sort: [Proximity, BrokenStyle]
        actions: { partial_allocation: false, unavailable: next_rule }

      - sequence: 4
        name: "All locations, allow split"
        inventory_filter: { FacilityGroup: All_locations, ShipmentThresholdValueCheck: ">=50" }
        facility_sort: [Proximity, BrokenStyle]
        actions:
          partial_allocation: "true (only if shipment value ≥ $50)"
          unavailable: "Unfillable Parking"
    notes:
      - "Wider 300-mile radius reflects standard SLA tolerance for transit time."
      - "BrokenStyle sort biases toward stores carrying fragmented inventory — clears aging stock before markdown."
      - "Underperforming stores included in rule 2 to surface their inventory before expanding to all locations."
      - "Shipment threshold of $50 gates splits — small-value orders ship whole or fall to unfillable."

  agent_guidance: >
    When a merchant asks "how should I set up routing", default to surfacing
    these two configurations side by side. They're the booklet's reference
    setups and cover ~80% of common needs. Always confirm:
      1. Which shipment methods exist and which are expedited?
      2. What FacilityGroups exist (especially Warehouses, Stores, Large-format, Underperforming)?
      3. Is there a Brokering Shipment Threshold configured at the product store level?
      4. What proximity radii fit the customer geography?
    Adjust the canonical configs based on those answers rather than recommending them verbatim.


# ─────────────────────────────────────────────────────────────────────────────
# CONCEPTUAL FACILITY-SCORING DIMENSIONS (Times Square vs Hoboken)
# The marketing booklet illustrates why distance alone is insufficient using
# a Times Square (NYC) vs Hoboken (NJ) comparison. The dimensions surfaced
# there are NOT all directly modelled in HotWax filters/sorts today — some
# are operational realities the agent must surface as caveats.
# ─────────────────────────────────────────────────────────────────────────────

facility_scoring_dimensions:

  preamble: >
    The booklet's Times Square vs Hoboken example shows that "less distance
    doesn't always mean better." Below: the dimensions retailers consider
    when evaluating a fulfillment location, with the HotWax mechanism (or
    workaround) that approximates each.

  dimensions:

    distance:
      booklet_meaning: "Miles from facility to customer."
      hotwax_mechanism: "Proximity inventory filter and Proximity sort."
      directly_modelled: true

    inventory_turnover:
      booklet_meaning: >
        How quickly stock cycles through the facility. High turnover stores
        (flagships like Times Square) burn through inventory fast — pulling
        more for online means less for the walk-in shopper standing there.
      hotwax_mechanism: >
        Indirect. Combine BrokeringSafetyStock (floor on facility ATP) with
        MaximumOrderLimit (cap on daily orders accepted from a facility).
        Not a direct turnover signal — the merchant must classify high-turnover
        facilities themselves.
      directly_modelled: false
      agent_caveat: >
        "HotWax does not measure turnover directly. We can approximate by
        setting a Brokering Safety Stock floor and order cap on the
        identified high-turnover stores."

    foot_traffic:
      booklet_meaning: >
        Walk-in customer volume. High foot traffic = high in-person
        sellthrough = high opportunity cost of pulling stock for online.
      hotwax_mechanism: "Same as inventory_turnover — indirect via safety stock + order limit."
      directly_modelled: false
      agent_caveat: >
        "Foot traffic isn't a routing input. The retailer classifies which
        stores have heavy foot traffic, and we protect those via safety
        stock or by routing them later in the inventory rule sequence."

    loading_difficulty:
      booklet_meaning: >
        How easily a carrier can pick up packages — dock access, mall hours,
        urban congestion, security restrictions. Mall-based and store-in-store
        locations score poorly here.
      hotwax_mechanism: >
        Indirect. Use FacilityGroup exclusions (e.g. exclude Mall-based stores
        from expedited routing) or CustomSequence to push hard-to-load
        facilities later in the sequence.
      directly_modelled: false
      agent_caveat: >
        "HotWax doesn't model dock access. The fix is structural — put
        hard-to-load facilities in a separate group and exclude them from
        the rules where pickup speed matters."

  agent_pattern: >
    When a merchant says "but the nearest store is X and that's not actually
    a good choice," they are usually pointing at one of inventory_turnover,
    foot_traffic, or loading_difficulty. Identify which, then map to the
    closest HotWax mechanism. Be explicit about what HotWax models directly
    vs what requires merchant classification.


# ─────────────────────────────────────────────────────────────────────────────
# PRODUCT-ATTRIBUTE ROUTING
# Routing decisions driven by what's IN the order, not just where it goes.
# Sourced from the "Popular Omnichannel Configurations" booklet.
# These patterns are not first-class filters on RoutingRule today — they
# are typically implemented via separate routing rules scoped to product
# tags, product categories, or product types via the Shopify/HotWax
# product attribute layer.
# ─────────────────────────────────────────────────────────────────────────────

product_attribute_routing:

  preamble: >
    Some routing decisions depend on what the customer is buying, not who
    they are or where the order is going. The booklet documents three
    canonical product-attribute patterns: new launches, custom fulfillment,
    and broken-style clearance. The agent should recognise these as
    distinct from queue/channel/method-based routing.

  patterns:

    new_launches_from_warehouses:
      intent: "Ship new, limited-edition, high-demand product launches from warehouses first."
      reasoning: >
        New launches have unpredictable demand and concentrated inventory.
        Warehouses have the picking capacity to absorb a surge; stores risk
        running out before walk-in customers see the product. Once demand
        stabilises (usually after the first 1-2 weeks), launch products can
        move to store fulfillment alongside the rest of the catalogue.
      configuration:
        order_filter: "Product tag = New_Launch (or Collection = New Launches)"
        inventory_rule:
          inventory_filter: { FacilityGroup: Warehouses }
          facility_sort: [Proximity, InventoryBalance]
          actions: { partial_allocation: false, unavailable: "Unfillable Parking" }
      lifecycle:
        - "Phase 1 (launch week): warehouse-only routing rule active"
        - "Phase 2 (stabilisation): rule archived or sequence-lowered"
        - "Phase 3 (steady state): product follows the standard routing rule"
      merchant_signals:
        - "we're dropping a limited release"
        - "this product just launched and we don't want stores running out"
        - "control fulfillment until demand stabilises"
      caveat: >
        HotWax routing rules filter on order-level attributes natively
        (queue, channel, shipment method). Product-tag filtering may require
        either (a) a Shopify tag-driven sales channel mapped to a HotWax
        SalesChannel value, or (b) a separate BrokeringRun scoped manually.
        Confirm the mechanism with the merchant before recommending.

    custom_fulfillment_capable_facilities:
      intent: >
        Route products that need custom fulfillment steps (engraving,
        alterations, embroidery, gift wrapping, hazardous-goods handling)
        only to facilities equipped to perform them.
      reasoning: >
        Not every store can engrave a watch or hem trousers. Routing such
        an order to a non-capable store guarantees rejection or delay.
      configuration:
        order_filter: "Product tag = Requires_Engraving (or equivalent custom-fulfillment tag)"
        inventory_rule:
          inventory_filter: { FacilityGroup: Custom_Fulfillment_Capable }
          facility_sort: [Proximity]
          actions: { partial_allocation: false, unavailable: "Move to manual queue" }
      merchant_signals:
        - "engraving / monogramming"
        - "alterations"
        - "gift wrap / gift box"
        - "made-to-order"
        - "requires special handling"
      prerequisite: >
        Merchant must maintain a FacilityGroup of capable facilities and
        tag the relevant products. Without both, the agent cannot recommend
        this pattern as a routing rule.

    high_velocity_sku_safety_stock:
      intent: >
        Apply higher safety-stock buffers to fast-moving SKUs to prevent
        stockouts during peak demand.
      reasoning: >
        A blanket BrokeringSafetyStock of 5 protects walk-ins for slow
        movers but starves fast movers — the 5-unit floor may be hit
        within hours on a high-velocity SKU during a sale.
      configuration: >
        Configure per-product safety stock at the Facility-Product level
        (Facility App → Product Inventory → Safety Stock). The brokering
        engine reads this floor when computing facility eligibility.
      example: "High Velocity Boots → Size 9, 10, 11 → safety stock = 8 (vs catalogue default 3)"
      merchant_signals:
        - "high-velocity items"
        - "we keep running out of [specific SKU]"
        - "best sellers"
        - "the size 9s sell out first"
      caveat: >
        Per-SKU velocity-based safety stock is configured outside the Order
        Routing app (in inventory configuration). The agent can recommend
        it but should redirect the merchant to the Facility App / ATP App
        for the actual configuration. It is NOT a routing rule filter.

    aging_stock_clearance:
      intent: >
        Route standard orders to facilities holding slow-moving or
        fragmented inventory to clear stock before markdown.
      configuration: "Already documented under BrokenStyle sort and ClearAgingInventory goal — cross-reference."
      see_also: [BrokenStyle, ClearAgingInventory, underperforming_stores]


# ─────────────────────────────────────────────────────────────────────────────
# ADVANCED REJECTION HANDLING
# Rejection of items by a facility is not a single action. The booklet
# distinguishes partial rejection, collateral rejection, and rejected-order
# re-routing — each has a distinct trigger and remedy.
# ─────────────────────────────────────────────────────────────────────────────

advanced_rejection_handling:

  preamble: >
    When a facility cannot fulfil an order, the response can be more
    nuanced than "move the order to Unfillable Parking." The Fulfillment
    App exposes two configurable rejection behaviours that interact with
    routing: partial rejection (item-level) and collateral rejection
    (cross-order). Both feed orders back into a Rejected Item Parking
    queue, which the routing engine can pick up via a dedicated routing
    rule.

  partial_rejection:
    definition: >
      Reject only the unavailable items from an order; fulfil the rest.
      Prevents one OOS line from blocking the entire order.
    configured_in: "Fulfillment App → Store Settings → Allow partial rejections"
    enabled_by_default: false
    interaction_with_routing: >
      Rejected items go into Rejected_Parking (UI: "Rejected Item Parking").
      A dedicated routing rule with Queue = Rejected_Parking re-brokers them.
    when_to_recommend:
      - "Merchant has many multi-item orders where stockouts on one line shouldn't delay the rest"
      - "SLAs are tight and re-routing the unavailable items separately is faster than holding the whole order"
    trade_off: >
      Improves on-time delivery rate for available items, but increases
      shipment count (more packages, more freight) and customer-perceived
      fragmentation ("why did this arrive in two boxes?").

  collateral_rejection:
    definition: >
      When a facility rejects an item, automatically reject the matching
      item from ALL other open orders at the same facility. This batches
      the stockout — instead of each order discovering the problem
      one-by-one, every affected order is rerouted in one sweep.
    configured_in: "Fulfillment App → Store Settings → Auto reject related items"
    enabled_by_default: false
    why_it_matters: >
      Without this, the second, third, and Nth orders all hit the same
      rejection independently — each one adds latency, each one risks a
      separate SLA miss, each one requires manual intervention. Collateral
      rejection makes one rejection answer for all of them.
    when_to_recommend:
      - "High-volume stores where stockouts cascade through queued orders"
      - "Merchant complains: 'one item out of stock and 20 orders piled up'"
      - "Operations team is spending time manually re-routing repeat rejections"
    interaction_with_routing: >
      Rejected items flood Rejected_Parking simultaneously. The Rejected
      Items routing rule then needs sufficient inventory capacity and
      proximity radius to absorb the batch, otherwise they cascade
      through to Unfillable_Parking.
    agent_caveat: >
      Recommend a dedicated, broad-radius routing rule for Rejected_Parking
      whenever collateral rejection is enabled — otherwise the spike of
      rejections will overwhelm the standard re-routing rule.

  rejected_order_routing_rule:
    purpose: >
      A standing routing rule that re-brokers anything in Rejected_Parking.
      Should run more frequently than the standard run to recover SLA.
    canonical_setup:
      order_filter:
        Queue: [Rejected_Parking]
        ShipmentMethodType: "(typically all — rejected orders carry their original SLA)"
      order_sort: [ShippingMethod, OrderDate]
      inventory_rule:
        inventory_filter: "(broader than the original rule — typically no FacilityGroup restriction)"
        facility_sort: [Proximity, InventoryBalance]
        actions:
          partial_allocation: true
          unavailable: "Unfillable Parking"
    placement: "Usually its own BrokeringRun on a 5-15 minute schedule."
    agent_pattern: >
      Always confirm a Rejected_Parking routing rule exists before
      enabling partial or collateral rejection. Without it, rejected
      orders accumulate without retry.


# ─────────────────────────────────────────────────────────────────────────────
# FALLBACK FACILITIES
# A specific facility classification: locations that do not participate in
# primary online fulfillment but are eligible as last-resort destinations.
# ─────────────────────────────────────────────────────────────────────────────

fallback_facilities:

  definition: >
    A FacilityGroup whose members are NOT enabled for online fulfillment
    by default — they participate only in the final inventory rule of a
    routing sequence, when no primary facility can fulfil. Distinct from
    a "store fallback" pattern (where stores serve as fallback after
    warehouses) — fallback facilities are typically off-the-grid
    locations: clearance outlets, returns processing centres, third-party
    overflow warehouses, or geographic outliers.

  examples:
    - "Outlet store carrying overstock but not regularly used for online"
    - "Third-party fulfillment warehouse held in reserve"
    - "Returns processing centre with usable returned inventory"
    - "Regional DC outside primary service area"

  configuration_pattern:
    facility_group: "Fallback_Locations (Brokering_Group subtype)"
    referenced_in: "Final inventory rule only, after all primary rules fail"
    typical_inventory_rule:
      sequence: "(last in sequence)"
      inventory_filter: { FacilityGroup: Fallback_Locations }
      facility_sort: [InventoryBalance]
      actions:
        partial_allocation: true
        unavailable: "Unfillable Parking + auto_cancel_days: 7"

  why_separate_from_stores_fallback:
    description: >
      The "warehouse → store fallback" pattern uses stores as a normal
      secondary fulfillment tier. Fallback_Locations is different: these
      facilities are explicitly excluded from normal routing and only
      activated when everything else has failed. Treating them the same
      conflates two different operational realities.

  merchant_signals:
    - "we have a warehouse we don't normally ship from but could"
    - "last resort fulfillment"
    - "outlet inventory we'd rather not touch"
    - "use only if nothing else works"


# ─────────────────────────────────────────────────────────────────────────────
# GLOBAL OVERSELLING PROTECTION
# A per-product inventory buffer applied across all channels. Distinct from
# the per-rule BrokeringSafetyStock filter.
# ─────────────────────────────────────────────────────────────────────────────

global_overselling_protection:

  definition: >
    A per-product inventory buffer that prevents the same unit being sold
    across multiple channels before brokering can reconcile reservations.
    Operates at the product level (or product-variant level), not at the
    routing-rule level.
  configured_in: "Product Store settings or ATP App per-product threshold."
  example: "Suede Boots → global threshold = 1 → never sell the last unit on any channel."

  distinction_from_brokering_safety_stock:
    BrokeringSafetyStock:
      scope: "Per inventory rule"
      effect: "Excludes facilities with ATP below the floor from THIS rule"
      visibility: "Affects routing eligibility only"
    GlobalThreshold:
      scope: "Per product (across all channels and facilities)"
      effect: "Reduces published Online ATP across the network"
      visibility: "Visible to Shopify and other sales channels — affects what customers can buy at all"
    when_to_use_which:
      BrokeringSafetyStock: "Walk-in protection or velocity tuning at the rule level"
      GlobalThreshold: "Cross-channel overselling protection for specific high-risk products"

  agent_caveat: >
    These two settings are independent and additive. A merchant complaining
    "we're still overselling" may need to adjust the GlobalThreshold (which
    affects what gets sold) rather than BrokeringSafetyStock (which affects
    where allocated orders are routed).


# ─────────────────────────────────────────────────────────────────────────────
# FACILITY-EXCLUSION REASONS (Map view labels)
# When the routing engine evaluates a facility and rejects it, the reason
# falls into one of a small number of categories. The Map view in HotWax's
# UI labels these explicitly. The agent should use the same vocabulary
# when explaining why a facility was not selected.
# ─────────────────────────────────────────────────────────────────────────────

facility_exclusion_reasons:

  preamble: >
    When diagnosing why a facility was not chosen for an order, classify
    the reason into one of these six categories. Each maps to a specific
    HotWax mechanism. The agent should name the category, then the
    underlying configuration, then the fix.

  categories:

    out_of_stock:
      meaning: "Facility has zero ATP for one or more order items."
      underlying: "ATP = QOH - reservations = 0 (or below order quantity)"
      fix_path:
        - "Verify QOH at the facility"
        - "Check if reservations are blocking visible stock"
        - "Confirm whether the SKU is enabled for online fulfillment at this facility"

    low_inventory:
      meaning: "Facility has stock, but below the configured BrokeringSafetyStock floor."
      underlying: "ATP < BrokeringSafetyStock threshold for this rule"
      fix_path:
        - "Lower BrokeringSafetyStock on the rule"
        - "Or accept the exclusion (walk-in protection working as intended)"

    too_far:
      meaning: "Facility is outside the rule's Proximity radius."
      underlying: "Distance(facility, customer) > Proximity filter"
      fix_path:
        - "Expand proximity radius on the current rule"
        - "Or add a fallback rule with a wider radius"

    slow_shipping:
      meaning: "Facility cannot meet the order's SLA from this location."
      underlying: >
        Not directly modelled — this is implicit when proximity is wide
        but the shipping method is expedited. Diagnosed via comparing
        the facility-to-customer carrier zone against the SLA window.
      fix_path:
        - "Separate expedited orders into their own routing rule"
        - "Tighten Proximity radius on expedited routing rules"
        - "Restrict expedited routing to FacilityGroup = Same_day_enabled"

    fallback_location:
      meaning: "Facility is explicitly designated as fallback-only and was skipped because primary rules succeeded."
      underlying: "Facility is in Fallback_Locations group, only referenced in final rule"
      fix_path:
        - "(Usually no fix needed — this is the configured behaviour)"
        - "If the merchant expected this facility to be primary, move it to a primary FacilityGroup"

    inactive:
      meaning: "Facility is not enabled for online fulfillment or is currently disabled."
      underlying: >
        Facility.status = Inactive, OR facilityTypeId not enabled for online,
        OR MaximumOrderLimit = NoCapacity (temporary disable).
      fix_path:
        - "Re-enable the facility in the Facility App"
        - "Or change MaximumOrderLimit from NoCapacity to Unlimited/Custom"

  agent_pattern: >
    When a merchant asks "why didn't [facility] get the order?", surface
    the exclusion reason in the merchant's vocabulary (one of the six
    categories) before drilling into the technical mechanism. "Times
    Square was skipped because it was over its daily cap" is easier to
    act on than "MaximumOrderLimit guard fired."


# ─────────────────────────────────────────────────────────────────────────────
# WORKLOAD MANAGEMENT TACTICS
# Specific recurring tactics for managing store-level workload, from the
# "Configure store workloads" section of the booklet. Each is a concrete
# action the merchant can take, not a goal or pattern.
# ─────────────────────────────────────────────────────────────────────────────

workload_management_tactics:

  select_stores:
    description: >
      Only enable ship-from-store on facilities that have the space,
      staffing, and customer-traffic profile to actually fulfil orders.
    not_every_store_should_fulfil: true
    decision_criteria:
      - "Does the back-of-house have packing space?"
      - "Is staffing adequate for pick + pack labour?"
      - "Is customer traffic low enough that associates aren't pulled away?"
    mechanism: "Add only qualifying stores to the FacilityGroup used by inventory rules."

  deprioritise_busy_stores:
    description: >
      Stores with heavy in-traffic (e.g. mall flagships during weekends)
      should be deprioritised, not removed entirely. Keep them as
      fallback after warehouses and other stores.
    mechanism:
      - "Place busy-store FacilityGroup later in the inventory rule sequence"
      - "OR use CustomSequence sort to push them last"
      - "OR cap them with a lower MaximumOrderLimit"
    do_not: "Remove them from the network — losing the inventory pool entirely overshoots the goal."

  emergency_capacity_off:
    description: >
      When staffing breaks down or an emergency hits, the fastest fix is
      MaximumOrderLimit = NoCapacity. Immediate, reversible, no routing-rule
      edit required.
    contrast_with:
      removing_from_group:
        slowness: "Requires editing the routing rule"
        reversibility: "Edit again to add back — easy to forget"
        audit_trail: "Harder to see what changed"
      maximumOrderLimit_NoCapacity:
        slowness: "One field toggle in the Facility App"
        reversibility: "Toggle back to Unlimited/Custom"
        audit_trail: "Facility setting history captures it"
    typical_triggers:
      - "Picker called in sick"
      - "POS system outage in store"
      - "Severe weather"
      - "Unexpected walk-in spike"

  scheduled_capacity_changes:
    description: >
      For predictable rush periods (weekends, mall events), pre-set
      MaximumOrderLimit values and use the BrokeringRun schedule to
      effectively switch between weekday and weekend behaviour.
    mechanism: >
      Either (a) manually adjust capacity each period, or (b) run two
      different BrokeringRuns with different inventory rules — one with
      busy stores excluded for peak hours, one with them included for
      off-peak.


# ─────────────────────────────────────────────────────────────────────────────
# OMNICHANNEL APP SUITE CONTEXT
# Order Routing is one app in HotWax's broader Omnichannel App Suite.
# The agent should know what the adjacent apps are so it can redirect
# questions that fall outside its scope.
# ─────────────────────────────────────────────────────────────────────────────

app_suite_context:

  positioning: >
    The Order Routing app is one of twelve apps in HotWax's Omnichannel
    App Suite. The brokering engine reads configuration from several of
    them — the agent should be able to name the right app when a merchant
    asks about something outside the routing-rule editor.

  apps_in_suite:
    OrderRouting:
      scope: "Routing rules, inventory rules, brokering runs (THIS AGENT'S DOMAIN)"
    Fulfillment:
      scope: "Pick/pack workflows, partial rejection, collateral rejection, ship-from-store ops"
      affects_routing: "Rejection settings determine what enters Rejected_Parking"
    Facilities:
      scope: "Facility creation, FacilityGroup management, facility addresses (lat/long)"
      affects_routing: "FacilityGroups referenced in inventory rule filters live here"
    ATP:
      scope: "Available-to-promise calculations, per-product safety stock, global thresholds"
      affects_routing: "Per-SKU safety stock and global overselling buffers are set here"
    PreOrders:
      scope: "Pre-order capture, promise-date management"
      affects_routing: "Pre-orders sit in Preorder_Backorder_Parking until release"
    BOPIS:
      scope: "Buy-online-pickup-in-store fulfillment"
      affects_routing: "BOPIS orders bypass brokering (BOPISFacilityLock)"
    JobManager:
      scope: "Scheduled job orchestration"
      affects_routing: "Brokering run schedules surface here"
    Receiving:
      scope: "Inbound receiving — POs, transfers, returns acceptance"
      affects_routing: "BORIS QOH updates flow from acceptance events"
    Picking:
      scope: "In-store pick workflows"
      affects_routing: "Indirect — affects whether a store can keep up with allocated orders"
    CycleCount:
      scope: "Inventory accuracy management"
      affects_routing: "Indirect — better counts = more reliable ATP"
    Import:
      scope: "Data import (products, orders, inventory)"
    Users:
      scope: "User and permission management"

  agent_redirect_patterns:
    description: "When a merchant question falls outside Order Routing, point them at the right app."
    examples:
      - merchant_says: "How do I set up engraving capability for store X?"
        redirect: "Facility App → Facility Settings → Capabilities. Then route to a custom FacilityGroup here."
      - merchant_says: "Why is Shopify still showing this product as in stock?"
        redirect: "ATP App → Per-product threshold and Online ATP safety stock. Routing rules don't control Shopify visibility."
      - merchant_says: "How do I change when a brokering job runs?"
        redirect: "Schedule lives here in Order Routing. But if it's not firing, check Job Manager for the job status."
      - merchant_says: "Where do I configure auto-reject for items out of stock?"
        redirect: "Fulfillment App → Store Settings → Auto reject related items. Then make sure a Rejected_Parking routing rule exists here."


# ─────────────────────────────────────────────────────────────────────────────
# CONFIGURATION LIFECYCLE
# The booklet describes a Configure → Test → Apply lifecycle for routing
# logic. This is the discipline the agent should encourage when proposing
# rule changes.
# ─────────────────────────────────────────────────────────────────────────────

configuration_lifecycle:

  preamble: >
    "Configure. Test. Apply." is HotWax's documented discipline for
    routing changes. The agent should never recommend activating a rule
    without a test step in between. Treat Test Drive as a required gate.

  phases:

    configure:
      description: "Author the routing rule, inventory rules, filters, and sorts in Draft status."
      agent_role: >
        Build the configuration from the merchant's stated intent, citing
        the canonical_configurations reference setups where applicable.
        Confirm prerequisites (FacilityGroups exist, shipment methods
        mapped, etc.) before naming specific filter values.

    test:
      description: "Run Test Drive against real orders without processing live transactions."
      agent_role: >
        Recommend Test Drive as the validation gate. Surface which orders
        would route where, and especially which would fall to unfillable.
        Compare predicted outcomes against merchant expectations.
      see_also: test_drive

    apply:
      description: "Set inventory rules, routing rules, then the brokering run to Active."
      activation_order: "Inventory rules → routing rules → brokering run"
      agent_role: >
        Walk the merchant through activation in the right order. Remind
        them: a rule in Draft is configured but inert. Active is the only
        status that processes orders.

    review:
      description: "Monitor brokered orders and unfillable counts after activation."
      agent_role: >
        Schedule a checkpoint (e.g. 24 hours, 1 week) to review brokered
        counts and unfillable rates. Compare against expected volumes. Use
        BrokeredItemsReport and BrokeredCountReport (see reports section).

  agent_communication_pattern: >
    Frame recommendations as "Here's the configuration. Let's Test Drive it
    against your current queue before activating." Never frame an unconfirmed
    rule as the final answer.
